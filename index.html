<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Arquitecto AR - Measurement PWA</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#8B5CF6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%20%22name%22%3A%20%22Arquitecto%20AR%22%2C%20%22short_name%22%3A%20%22ArquiAR%22%2C%20%22start_url%22%3A%20%22.%22%2C%20%22display%22%3A%20%22standalone%22%2C%20%22background_color%22%3A%20%22%23F4F5F9%22%2C%20%22theme_color%22%3A%20%22%238B5CF6%22%20%7D">

    <!-- Librerías Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap');
        
        body { margin: 0; overflow: hidden; background-color: #F8F9FF; font-family: 'Nunito', system-ui, sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        #ar-container { width: 100vw; height: 100vh; display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Capas de Interfaz */
        #home-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; background: linear-gradient(180deg, #F8F9FF 0%, #E9ECF5 100%); overflow-y: auto; }
        #ar-ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 1rem 1rem 2rem 1rem; }
        #plan-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 60; background-color: #1a1b35; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;}
        
        .interactive { pointer-events: auto; }
        .ui-control { touch-action: none; }

        /* Estilo del botón AR nativo inyectado por Three.js */
        #ARButton { 
            background: #A78BFA !important; color: white !important; border-radius: 9999px !important; 
            padding: 16px 32px !important; font-size: 1.125rem !important; font-family: 'Nunito', sans-serif !important;
            font-weight: 700 !important; border: none !important; box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.4) !important;
            bottom: 40px !important; position: absolute !important; left: 50% !important; transform: translateX(-50%) !important;
            width: 85% !important; max-width: 320px !important; display: flex !important; justify-content: center !important; align-items: center !important;
        }

        /* Etiqueta Flotante de Medida Profesional (Pill) */
        .measure-pill {
            position: absolute; background: white; color: #312E81; padding: 6px 16px; border-radius: 9999px;
            font-weight: 700; font-size: 0.95rem; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transform: translate(-50%, -100%); pointer-events: none; display: none; white-space: nowrap; z-index: 20;
            border: 1px solid rgba(139, 92, 246, 0.3);
            margin-top: -15px; /* Offset to float above line */
        }
        
        /* Puntero hacia abajo de la etiqueta */
        .measure-pill::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; margin-left: -6px;
            border-width: 6px 6px 0 6px; border-style: solid; border-color: white transparent transparent transparent;
        }

        /* Toolbar activo */
        .tool-btn { transition: all 0.2s ease; background: rgba(255,255,255,0.9); }
        .tool-btn.active { background-color: #8B5CF6; color: white; transform: scale(1.05); }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Botón Inferior de Acción AR */
        .btn-ar-action {
            background: #9FA8DA; /* Soft purple/blue from screenshot */
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(8px);
        }
        
        /* Contenedor del Plano Blanco */
        .plan-paper {
            background: white;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 3/4;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        #plan-canvas {
            width: 100%;
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <!-- 1. PANTALLA DE INICIO (HOME) -->
    <div id="home-screen" class="flex flex-col items-center pt-24 px-6">
        <div class="flex flex-col gap-6 w-full max-w-sm z-10">
            <!-- Tarjeta 1: Techo Curvo -->
            <button class="bg-white rounded-[2rem] p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white flex items-center gap-6 active:scale-95 transition-transform text-left">
                <div class="w-16 h-16 flex-shrink-0">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 75 L 15 45 L 50 15 L 85 45 L 85 75 Z" stroke="#8B5CF6" stroke-width="3" stroke-linejoin="round"/>
                        <rect x="35" y="45" width="10" height="15" stroke="#8B5CF6" stroke-width="2" transform="skewY(-15)"/>
                        <rect x="55" y="45" width="10" height="15" stroke="#8B5CF6" stroke-width="2" transform="skewY(15)"/>
                    </svg>
                </div>
                <div>
                    <span class="bg-[#A78BFA] text-white text-[10px] font-bold px-3 py-1 rounded-full mb-2 inline-block">beta</span>
                    <h2 class="text-[#312E81] text-xl font-semibold">Techo curvo</h2>
                    <p class="text-slate-400 text-sm mt-1">(Modo manual)</p>
                </div>
            </button>

            <!-- Tarjeta 2: Habitación Sencilla -->
            <button id="btn-mode-room" class="bg-white rounded-[2rem] p-6 shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-indigo-50 flex items-center gap-6 active:scale-95 transition-transform text-left">
                <div class="w-16 h-16 flex-shrink-0">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 20 L90 40 L50 60 L10 40 Z" stroke="#312E81" stroke-width="3" stroke-linejoin="round"/>
                        <path d="M10 40 L10 70 L50 90 L90 70 L90 40" stroke="#312E81" stroke-width="3" stroke-linejoin="round"/>
                        <path d="M50 60 L50 90" stroke="#312E81" stroke-width="3" stroke-linejoin="round"/>
                        <rect x="25" y="60" width="10" height="15" stroke="#312E81" stroke-width="2"/>
                        <rect x="65" y="50" width="10" height="15" stroke="#312E81" stroke-width="2" transform="skewY(-20)"/>
                    </svg>
                </div>
                <div>
                    <h2 class="text-[#312E81] text-xl font-semibold">Habitación<br>sencilla</h2>
                </div>
            </button>
        </div>
        
        <div id="ar-button-container" class="w-full flex justify-center mt-auto pb-10 z-10"></div>
    </div>

    <!-- Contenedor AR 3D -->
    <div id="ar-container"></div>

    <!-- 2. CAPA UI EN AR (DOM Overlay) -->
    <div id="ar-ui-layer" class="hidden">
        
        <!-- Etiqueta de medición 3D a 2D (Pill) -->
        <div id="measure-label" class="measure-pill">0.00 m</div>

        <!-- Toolbar Superior -->
        <div class="flex justify-between items-start w-full relative z-50">
            <button id="btn-exit" class="interactive ui-control bg-white/95 backdrop-blur-md text-[#312E81] w-12 h-12 rounded-full shadow-lg flex items-center justify-center active:scale-90 transition-transform">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </button>
            
            <button id="btn-show-plan" class="interactive ui-control bg-white/95 backdrop-blur-md text-[#312E81] px-4 h-12 rounded-full shadow-lg flex items-center justify-center gap-2 active:scale-90 transition-transform font-bold">
                <i class="fa-solid fa-map"></i> Planos
            </button>
        </div>

        <!-- Toolbar Lateral Izquierdo (Herramientas PWA) -->
        <div id="tools-sidebar" class="absolute left-4 top-1/2 transform -translate-y-1/2 flex flex-col gap-3 interactive z-50">
            <button class="tool-btn active ui-control w-12 h-12 rounded-full shadow-lg flex items-center justify-center text-slate-600" data-tool="area">
                <i class="fa-regular fa-square text-lg"></i>
            </button>
            <button class="tool-btn ui-control w-12 h-12 rounded-full shadow-lg flex items-center justify-center text-slate-600" data-tool="volume">
                <i class="fa-solid fa-cube text-lg"></i>
            </button>
            <button class="tool-btn ui-control w-12 h-12 rounded-full shadow-lg flex items-center justify-center text-slate-600" data-tool="line">
                <i class="fa-solid fa-ruler text-lg"></i>
            </button>
            
            <div class="w-8 border-b border-slate-300 mx-auto my-1"></div>
            
            <button id="btn-undo" class="ui-control w-12 h-12 rounded-full bg-white/90 shadow-lg flex items-center justify-center text-rose-500 active:bg-rose-50">
                <i class="fa-solid fa-rotate-left text-lg"></i>
            </button>
        </div>

        <!-- Tarjeta de Instrucción Central Inferior -->
        <div class="w-full flex flex-col items-center mt-auto pb-4 interactive z-50">
            <div id="ar-instruction-card" class="bg-white/95 backdrop-blur px-8 py-4 rounded-[1.5rem] shadow-xl text-center mb-6 max-w-xs fade-in border border-slate-100">
                <p id="ar-instruction-text" class="text-[#312E81] font-semibold text-lg leading-tight">1. Apunta la cámara a un piso</p>
            </div>
            
            <!-- Botón Principal "Agregar nodo" -->
            <button id="btn-main-action" class="ui-control btn-ar-action rounded-[2rem] px-12 py-4 font-bold text-xl active:scale-95 transition-transform tracking-wide w-3/4 max-w-sm hidden">
                comienzo
            </button>
        </div>
    </div>

    <!-- 3. PANTALLA DE PLANOS 2D (BLUEPRINT) -->
    <div id="plan-screen">
        <div class="w-full max-w-500px flex justify-between items-center mb-4">
            <button id="btn-close-plan" class="text-white text-xl p-2"><i class="fa-solid fa-arrow-left"></i> Volver</button>
        </div>
        
        <!-- Hoja de plano tipo blueprint -->
        <div class="plan-paper" id="plan-paper-export">
            <canvas id="plan-canvas" width="800" height="800"></canvas>
            
            <!-- Leyenda Inferior -->
            <div class="p-6 border-t border-slate-200 bg-white">
                <div class="flex justify-between border-b-2 border-slate-800 pb-2 mb-4">
                    <span class="font-bold text-slate-800 tracking-widest text-sm uppercase">Measurements</span>
                    <span class="text-slate-500 text-sm font-semibold" id="plan-date">2026.01.01</span>
                </div>
                <div id="plan-legend" class="grid grid-cols-3 gap-2 text-[10px] text-slate-700 font-mono">
                    <!-- Dinámico -->
                </div>
            </div>
        </div>
        
        <button id="btn-export-pdf" class="mt-8 bg-[#4F46E5] text-white font-bold text-xl py-4 px-8 rounded-full shadow-[0_10px_20px_rgba(79,70,229,0.3)] active:scale-95 w-full max-w-xs">
            Grabar medidas en el plan
        </button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js';

        // --- Estado Global ---
        let currentTool = 'area'; // 'line', 'area', 'volume'
        let arState = 'scanning'; // 'scanning', 'ready', 'drawing'
        let currentMeasurePoints = []; 
        let savedMeasurements = []; // Array de objetos con las medidas
        
        let camera, scene, renderer, controller, reticle;
        let hitTestSource = null, hitTestSourceRequested = false;
        
        let tempMeshes = []; 
        let gridHelper = null;

        // UI Elements
        const measureLabel = document.getElementById('measure-label');
        const instructionCard = document.getElementById('ar-instruction-card');
        const instructionText = document.getElementById('ar-instruction-text');
        const btnMainAction = document.getElementById('btn-main-action');

        // --- Navegación Inicial ---
        document.getElementById('btn-mode-room').addEventListener('click', () => {
            // Comportamiento simulado para ir a AR (El botón real lo inyecta Threejs)
        });

        // Event Listeners Herramientas
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                const target = e.currentTarget;
                target.classList.add('active');
                currentTool = target.dataset.tool;
                resetCurrentMeasurement();
                updateInstructions();
            });
        });

        document.getElementById('btn-undo').addEventListener('click', undoMeasurement);
        document.getElementById('btn-exit').addEventListener('click', () => renderer.xr.getSession()?.end());
        
        // Planos UI
        document.getElementById('btn-show-plan').addEventListener('click', openPlanScreen);
        document.getElementById('btn-close-plan').addEventListener('click', () => {
            document.getElementById('plan-screen').style.display = 'none';
        });
        document.getElementById('btn-export-pdf').addEventListener('click', generarPDFPlanos);

        // --- Inicialización 3D ---
        init();
        animate();

        function init() {
            const container = document.getElementById('ar-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(1, 5, 1);
            scene.add(dirLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);
            
            // Botón nativo de AR
            const arButtonEl = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ar-ui-layer') }
            });
            arButtonEl.innerHTML = 'Detectar el piso';
            arButtonEl.addEventListener('click', () => {
                document.getElementById('home-screen').classList.add('hidden');
                document.getElementById('ar-ui-layer').classList.remove('hidden');
                resetARState();
            });
            document.getElementById('ar-button-container').appendChild(arButtonEl);

            controller = renderer.xr.getController(0);
            scene.add(controller);

            // --- DISEÑO DE RETÍCULA PROFESIONAL (Basado en la captura) ---
            const reticleGroup = new THREE.Group();
            
            // 1. Círculo exterior blanco fino
            const ringGeom = new THREE.RingGeometry(0.08, 0.085, 32).rotateX(-Math.PI / 2);
            reticleGroup.add(new THREE.Mesh(ringGeom, new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false })));
            
            // 2. Relleno púrpura translúcido
            const fillGeom = new THREE.CircleGeometry(0.08, 32).rotateX(-Math.PI / 2);
            reticleGroup.add(new THREE.Mesh(fillGeom, new THREE.MeshBasicMaterial({ color: 0x8B5CF6, transparent: true, opacity: 0.4, depthTest: false })));

            // 3. Cruz punteada
            const crossMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.01, gapSize: 0.01, depthTest: false });
            const lineX = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-0.1, 0, 0), new THREE.Vector3(0.1, 0, 0)]), crossMat);
            const lineZ = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, -0.1), new THREE.Vector3(0, 0, 0.1)]), crossMat);
            lineX.computeLineDistances(); lineZ.computeLineDistances();
            reticleGroup.add(lineX, lineZ);

            // 4. Punto central oscuro
            const dot = new THREE.Mesh(new THREE.CircleGeometry(0.015, 16).rotateX(-Math.PI / 2), new THREE.MeshBasicMaterial({ color: 0x1E1B4B, depthTest: false }));
            dot.position.y = 0.001; 
            reticleGroup.add(dot);

            // 5. Línea Vertical Infinita (Guía de pared)
            const vLineGeom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 4, 0)]);
            const vLineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, linewidth: 2, depthTest: false });
            reticleGroup.add(new THREE.Line(vLineGeom, vLineMat));

            reticle = reticleGroup;
            reticle.matrixAutoUpdate = false; 
            reticle.visible = false;
            reticle.renderOrder = 999; 
            scene.add(reticle);

            // Cuadrícula blanca translúcida
            gridHelper = new THREE.GridHelper(30, 150, 0xffffff, 0xffffff);
            gridHelper.material.opacity = 0.2;
            gridHelper.material.transparent = true;
            gridHelper.visible = false;
            scene.add(gridHelper);

            btnMainAction.addEventListener('beforexrselect', (ev) => ev.preventDefault());
            btnMainAction.addEventListener('click', handleMainAction);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Lógica AR ---
        function resetARState() {
            arState = 'scanning';
            resetCurrentMeasurement();
            gridHelper.visible = false;
            instructionText.innerText = "1. Apunta la cámara a un piso";
            btnMainAction.classList.add('hidden');
            measureLabel.style.display = 'none';
        }

        function resetCurrentMeasurement() {
            currentMeasurePoints = [];
            tempMeshes.forEach(m => scene.remove(m));
            tempMeshes = [];
            updateInstructions();
        }

        function updateInstructions() {
            if(arState === 'scanning') return;
            let pts = currentMeasurePoints.length;
            
            btnMainAction.innerText = pts === 0 ? "comienzo" : "Agregar nodo";
            
            if (currentTool === 'line') instructionText.innerText = pts === 0 ? "Marca el punto de inicio" : "Marca el punto final";
            if (currentTool === 'area') instructionText.innerText = pts === 0 ? "Comience a marcar las esquinas! PISO" : "Marca la esquina diagonal";
            if (currentTool === 'volume') {
                if(pts===0) instructionText.innerText = "Volumen: Marca primera esquina";
                if(pts===1) instructionText.innerText = "Volumen: Marca esquina opuesta base";
                if(pts===2) instructionText.innerText = "Volumen: Define la altura (arriba)";
            }
        }

        function handleMainAction() {
            if (!reticle.visible) return;
            if (navigator.vibrate) navigator.vibrate(50);

            const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
            currentMeasurePoints.push(pos.clone());

            // Dibujar punto (nodo)
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.02, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            sphere.position.copy(pos);
            scene.add(sphere);
            tempMeshes.push(sphere);

            // Comprobar fin de herramienta
            let toolFinished = false;
            if (currentTool === 'line' && currentMeasurePoints.length === 2) toolFinished = true;
            if (currentTool === 'area' && currentMeasurePoints.length === 2) toolFinished = true;
            if (currentTool === 'volume' && currentMeasurePoints.length === 3) toolFinished = true;

            if (toolFinished) finalizeMeasurement();
            else updateInstructions();
        }

        function finalizeMeasurement() {
            let finalMesh = null;
            let dataRecord = { tool: currentTool, points: [], results: {} };

            if (currentTool === 'line') {
                const [p1, p2] = currentMeasurePoints;
                const dist = p1.distanceTo(p2);
                dataRecord.results.length = dist;
                dataRecord.points = [p1, p2];

                const geom = new THREE.BufferGeometry().setFromPoints([p1, p2]);
                finalMesh = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 4 }));
            }
            else if (currentTool === 'area') {
                const [p1, p2] = currentMeasurePoints;
                const width = Math.abs(p2.x - p1.x);
                const depth = Math.abs(p2.z - p1.z);
                
                dataRecord.results.area = width * depth;
                dataRecord.results.perimeter = (width + depth) * 2;
                dataRecord.results.w = width;
                dataRecord.results.d = depth;
                dataRecord.points = [p1, p2];

                // Dibujar contorno blanco
                const rectPts = [
                    new THREE.Vector3(p1.x, p1.y, p1.z), new THREE.Vector3(p2.x, p1.y, p1.z),
                    new THREE.Vector3(p2.x, p1.y, p2.z), new THREE.Vector3(p1.x, p1.y, p2.z),
                    new THREE.Vector3(p1.x, p1.y, p1.z) // cerrar
                ];
                const geomLine = new THREE.BufferGeometry().setFromPoints(rectPts);
                finalMesh = new THREE.Line(geomLine, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 3 }));
                
                // Relleno translúcido
                const shapeGeom = new THREE.ShapeGeometry(new THREE.Shape().moveTo(0,0).lineTo(width,0).lineTo(width,depth).lineTo(0,depth).lineTo(0,0));
                shapeGeom.rotateX(Math.PI/2);
                const fill = new THREE.Mesh(shapeGeom, new THREE.MeshBasicMaterial({ color: 0x8B5CF6, opacity: 0.3, transparent: true, side: THREE.DoubleSide }));
                fill.position.set(Math.min(p1.x, p2.x), p1.y, Math.min(p1.z, p2.z));
                finalMesh.add(fill);
            }
            else if (currentTool === 'volume') {
                const [p1, p2, p3] = currentMeasurePoints;
                const width = Math.abs(p2.x - p1.x);
                const depth = Math.abs(p2.z - p1.z);
                const height = Math.abs(p3.y - p1.y);
                
                dataRecord.results.volume = width * depth * height;
                dataRecord.results.area = width * depth;
                dataRecord.results.height = height;
                dataRecord.points = [p1, p2, p3];

                const geom = new THREE.BoxGeometry(width, height, depth);
                finalMesh = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ color: 0xF59E0B, opacity: 0.2, transparent: true }));
                finalMesh.position.set((p1.x+p2.x)/2, p1.y + height/2, (p1.z+p2.z)/2);
                
                const edges = new THREE.EdgesGeometry(geom);
                finalMesh.add(new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff })));
            }

            if (finalMesh) {
                scene.add(finalMesh);
                dataRecord.mesh = finalMesh;
                dataRecord.id = savedMeasurements.length + 1; // [1], [2]...
                savedMeasurements.push(dataRecord);
                instructionText.innerText = "¡Medición registrada!";
                setTimeout(updateInstructions, 2000);
            }

            // Cleanup
            tempMeshes.forEach(m => scene.remove(m));
            tempMeshes = [];
            currentMeasurePoints = [];
            measureLabel.style.display = 'none';
        }

        function undoMeasurement() {
            if (currentMeasurePoints.length > 0) {
                resetCurrentMeasurement();
            } else if (savedMeasurements.length > 0) {
                const last = savedMeasurements.pop();
                scene.remove(last.mesh);
                instructionText.innerText = "Deshecho.";
                setTimeout(updateInstructions, 1500);
            }
        }

        // --- Render Loop (Tracking y HUD) ---
        function animate() { renderer.setAnimationLoop(render); }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(viewerSpace => {
                        session.requestHitTestSource({ space: viewerSpace }).then(source => hitTestSource = source);
                    });
                    session.addEventListener('end', () => { 
                        hitTestSourceRequested = false; hitTestSource = null; 
                        document.getElementById('ar-ui-layer').classList.add('hidden');
                        document.getElementById('home-screen').classList.remove('hidden');
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(hitTestResults[0].getPose(referenceSpace).transform.matrix);
                        const currentPos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);

                        // Cambio de estado inicial
                        if (arState === 'scanning') {
                            arState = 'ready';
                            gridHelper.position.y = currentPos.y;
                            gridHelper.visible = true;
                            btnMainAction.classList.remove('hidden');
                            updateInstructions();
                        }

                        // --- HUD Dinámico (Pill) ---
                        if (currentMeasurePoints.length > 0) {
                            const p1 = currentMeasurePoints[0];
                            let liveDist = 0;
                            let midPoint = currentPos.clone();

                            if (currentTool === 'line') {
                                liveDist = p1.distanceTo(currentPos);
                                midPoint.lerp(p1, 0.5);
                            } else if (currentTool === 'area' || (currentTool === 'volume' && currentMeasurePoints.length === 1)) {
                                liveDist = Math.hypot(currentPos.x - p1.x, currentPos.z - p1.z); // Diagonal suelo
                                midPoint.set((p1.x+currentPos.x)/2, p1.y, (p1.z+currentPos.z)/2);
                            } else if (currentTool === 'volume' && currentMeasurePoints.length === 2) {
                                liveDist = Math.abs(currentPos.y - p1.y); // Altura
                                midPoint.set(currentPos.x, (p1.y+currentPos.y)/2, currentPos.z);
                            }

                            // Posicionar etiqueta HTML en coordenadas de pantalla
                            const screenPos = midPoint.project(camera);
                            const x = (screenPos.x * .5 + .5) * window.innerWidth;
                            const y = (screenPos.y * -.5 + .5) * window.innerHeight;
                            
                            if (screenPos.z < 1) {
                                measureLabel.innerText = `${liveDist.toFixed(2)} m`;
                                measureLabel.style.display = 'block';
                                measureLabel.style.left = `${x}px`;
                                measureLabel.style.top = `${y}px`;
                            } else {
                                measureLabel.style.display = 'none';
                            }
                        } else {
                            measureLabel.style.display = 'none';
                        }
                    } else {
                        reticle.visible = false;
                        measureLabel.style.display = 'none';
                    }
                }
            }
            renderer.render(scene, camera);
        }

        // --- SISTEMA DE PLANOS 2D (BLUEPRINT) ---
        function openPlanScreen() {
            document.getElementById('plan-screen').style.display = 'flex';
            document.getElementById('plan-date').innerText = new Date().toLocaleDateString('es-ES', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '.');
            drawBlueprint();
        }

        function drawBlueprint() {
            const canvas = document.getElementById('plan-canvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width; const h = canvas.height;
            const legendContainer = document.getElementById('plan-legend');
            
            ctx.clearRect(0, 0, w, h);
            legendContainer.innerHTML = '';
            
            if (savedMeasurements.length === 0) {
                ctx.fillStyle = "#aaa"; ctx.font = "20px Arial"; ctx.textAlign = "center";
                ctx.fillText("No hay mediciones registradas", w/2, h/2);
                return;
            }

            // 1. Encontrar límites para escalar (Bounding Box 2D XZ)
            let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
            savedMeasurements.forEach(m => {
                m.points.forEach(p => {
                    minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
                    minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z);
                });
            });

            // Margen del 20%
            const rangeX = (maxX - minX) || 1; const rangeZ = (maxZ - minZ) || 1;
            const scale = Math.min(w / rangeX, h / rangeZ) * 0.7;
            const offsetX = (w - (rangeX * scale)) / 2;
            const offsetZ = (h - (rangeZ * scale)) / 2;

            const toScreen = (x, z) => ({ sx: offsetX + (x - minX) * scale, sz: offsetZ + (z - minZ) * scale });

            // 2. Dibujar Elementos
            savedMeasurements.forEach(m => {
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#1e293b'; // Slate 800
                ctx.fillStyle = '#1e293b';
                
                if (m.tool === 'area' || m.tool === 'volume') {
                    const p1 = toScreen(m.points[0].x, m.points[0].z);
                    const p2 = toScreen(m.points[1].x, m.points[1].z);
                    const rectW = p2.sx - p1.sx;
                    const rectH = p2.sz - p1.sz;
                    
                    // Relleno gris para Area
                    if(m.tool === 'area') {
                        ctx.fillStyle = '#cbd5e1'; // Slate 300
                        ctx.fillRect(p1.sx, p1.sz, rectW, rectH);
                    }
                    
                    // Contorno
                    ctx.strokeRect(p1.sx, p1.sz, rectW, rectH);
                    
                    // Puntos en las esquinas (Cuadritos negros)
                    ctx.fillStyle = '#000';
                    const sqSize = 8;
                    ctx.fillRect(p1.sx - sqSize/2, p1.sz - sqSize/2, sqSize, sqSize);
                    ctx.fillRect(p2.sx - sqSize/2, p1.sz - sqSize/2, sqSize, sqSize);
                    ctx.fillRect(p2.sx - sqSize/2, p2.sz - sqSize/2, sqSize, sqSize);
                    ctx.fillRect(p1.sx - sqSize/2, p2.sz - sqSize/2, sqSize, sqSize);

                    // Dibujar etiqueta ID [1], [2] en el centro o borde
                    ctx.fillStyle = '#fff'; ctx.fillRect(p2.sx + 10, p1.sz + 10, 24, 24);
                    ctx.strokeRect(p2.sx + 10, p1.sz + 10, 24, 24);
                    ctx.fillStyle = '#000'; ctx.font = "bold 14px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText(m.id, p2.sx + 22, p1.sz + 22);

                    // Cotas (Textos de medida en los lados)
                    ctx.font = "16px Arial";
                    ctx.fillText(`${m.results.w.toFixed(2)} m`, p1.sx + rectW/2, p1.sz - 15);
                    
                    ctx.save();
                    ctx.translate(p1.sx - 15, p1.sz + rectH/2);
                    ctx.rotate(-Math.PI/2);
                    ctx.fillText(`${m.results.d.toFixed(2)} m`, 0, 0);
                    ctx.restore();

                    // Generar HTML Leyenda
                    let legHTML = `<div><span class="font-bold">[${m.id}] ${m.tool === 'area' ? 'square' : 'cube'}</span><br>`;
                    if(m.tool==='volume') legHTML += `V=${m.results.volume.toFixed(2)}m³<br>`;
                    legHTML += `S=${m.results.area.toFixed(2)}m²<br>P=${m.results.perimeter.toFixed(2)}m`;
                    if(m.tool==='volume') legHTML += `<br>H=${m.results.height.toFixed(2)}m`;
                    legHTML += `</div>`;
                    legendContainer.innerHTML += legHTML;
                }
                else if (m.tool === 'line') {
                    const p1 = toScreen(m.points[0].x, m.points[0].z);
                    const p2 = toScreen(m.points[1].x, m.points[1].z);
                    
                    ctx.beginPath(); ctx.moveTo(p1.sx, p1.sz); ctx.lineTo(p2.sx, p2.sz); ctx.stroke();
                    
                    // Circulitos en los extremos
                    ctx.beginPath(); ctx.arc(p1.sx, p1.sz, 4, 0, 2*Math.PI); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(p2.sx, p2.sz, 4, 0, 2*Math.PI); ctx.fill(); ctx.stroke();
                    
                    // Texto
                    ctx.font = "16px Arial"; ctx.textAlign = "center";
                    ctx.fillText(`${m.results.length.toFixed(2)} m`, (p1.sx+p2.sx)/2, (p1.sz+p2.sz)/2 - 10);
                    
                    legendContainer.innerHTML += `<div><span class="font-bold">[${m.id}] line</span><br>L=${m.results.length.toFixed(2)}m</div>`;
                }
            });
        }

        // --- Exportación a PDF Final ---
        function generarPDFPlanos() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            
            // Fondo oscuro cabecera
            doc.setFillColor(26, 27, 53);
            doc.rect(0,0,210,297,'F');

            // Insertar el HTML como imagen capturada (Canvas)
            const paperCanvas = document.getElementById('plan-canvas');
            
            // Para simplificar, dibujamos un rectángulo blanco y metemos el canvas ahí
            doc.setFillColor(255, 255, 255);
            doc.roundedRect(15, 20, 180, 240, 5, 5, 'F');
            
            // Insertar imagen del plano
            doc.addImage(paperCanvas.toDataURL('image/png'), 'PNG', 20, 25, 170, 170);
            
            // Textos Leyenda en el PDF
            doc.setTextColor(50,50,50);
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text("Measurements", 20, 210);
            doc.text(document.getElementById('plan-date').innerText, 170, 210);
            doc.setDrawColor(50,50,50);
            doc.line(20, 212, 190, 212);

            let x = 20, y = 220;
            doc.setFontSize(8);
            doc.setFont("helvetica", "normal");
            
            savedMeasurements.forEach(m => {
                doc.setFont("helvetica", "bold");
                doc.text(`[${m.id}] ${m.tool}`, x, y);
                doc.setFont("helvetica", "normal");
                
                let yi = y + 4;
                if(m.tool === 'volume') { doc.text(`V=${m.results.volume.toFixed(2)}m³`, x, yi); yi+=4; }
                if(m.results.area) { doc.text(`S=${m.results.area.toFixed(2)}m²`, x, yi); yi+=4; }
                if(m.results.perimeter) { doc.text(`P=${m.results.perimeter.toFixed(2)}m`, x, yi); yi+=4; }
                if(m.tool === 'line') { doc.text(`L=${m.results.length.toFixed(2)}m`, x, yi); }
                if(m.results.height) { doc.text(`H=${m.results.height.toFixed(2)}m`, x, yi); }

                x += 50;
                if(x > 150) { x = 20; y += 25; }
            });

            doc.save('ArquiAR_Plan.pdf');
        }
    </script>
