<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Arquitecto AR - Web Scanner Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; background-color: #000; }
        #ar-container { width: 100vw; height: 100vh; display: block; }
        #map-canvas { position: absolute; top: 20px; left: 20px; width: 150px; height: 150px; background-color: rgba(255, 255, 255, 0.95); border: 2px solid #2C3E50; border-radius: 8px; z-index: 10; }
        #ui-panel { position: absolute; bottom: 80px; left: 20px; background: rgba(0, 0, 0, 0.85); color: white; padding: 15px; border-radius: 8px; z-index: 10; width: 220px; }
        #status-bar { position: absolute; top: 20px; right: 20px; background: rgba(255, 50, 50, 0.9); color: white; padding: 10px; border-radius: 8px; font-weight: bold; display: none; z-index: 10; }
        h2 { margin: 0 0 5px 0; font-size: 16px; }
        p { margin: 0 0 5px 0; font-size: 13px; color: #ccc; }
        #export-btn { margin-top: 10px; padding: 10px; background-color: #33C1FF; border: none; border-radius: 5px; color: black; font-weight: bold; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>
    <div id="status-bar"><i class="fa-solid fa-triangle-exclamation"></i> Tracking Perdido. Mueve el dispositivo lentamente.</div>
    <canvas id="map-canvas" width="300" height="300"></canvas>
    <div id="ui-panel">
        <h2><i class="fa-solid fa-pen-ruler"></i> Scanner Activo</h2>
        <p id="area-text"><i class="fa-solid fa-chart-area"></i> Área: 0.00 m²</p>
        <p id="points-text"><i class="fa-solid fa-vector-square"></i> Nodos: 0</p>
        <button id="export-btn"><i class="fa-solid fa-file-pdf"></i> Exportar CAD/PDF</button>
    </div>
    <div id="ar-container"></div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js';

        let camera, scene, renderer, controller, reticle;
        let hitTestSource = null, hitTestSourceRequested = false;
        const floorPlanPoints = []; 
        const SNAP_TOLERANCE = 0.15; // 15 cm de tolerancia para forzar ángulos rectos (Manhattan-World)

        init();
        animate();

        function init() {
            const container = document.getElementById('ar-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);
            document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            reticle = new THREE.Mesh(new THREE.RingGeometry(0.05, 0.1, 32).rotateX(-Math.PI / 2), new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
            reticle.matrixAutoUpdate = false; reticle.visible = false;
            scene.add(reticle);
        }

        function onSelect() {
            if (reticle.visible) {
                const position = new THREE.Vector3();
                position.setFromMatrixPosition(reticle.matrix);

                // Lógica de Snapping (Manhattan-World Assumption)
                let px = position.x;
                let pz = position.z;
                if (floorPlanPoints.length > 0) {
                    const lastPoint = floorPlanPoints[floorPlanPoints.length - 1];
                    if (Math.abs(px - lastPoint.x) < SNAP_TOLERANCE) px = lastPoint.x; // Ajuste eje X
                    if (Math.abs(pz - lastPoint.z) < SNAP_TOLERANCE) pz = lastPoint.z; // Ajuste eje Z
                }

                floorPlanPoints.push({ x: px, z: pz });
                
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.03, 16, 16), new THREE.MeshBasicMaterial({ color: 0x33C1FF }));
                sphere.position.set(px, position.y, pz);
                scene.add(sphere);

                // Dibujar líneas entre nodos
                if (floorPlanPoints.length > 1) {
                    const lastPoint = floorPlanPoints[floorPlanPoints.length - 2];
                    const material = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 3 });
                    const geometry = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(lastPoint.x, position.y, lastPoint.z), new THREE.Vector3(px, position.y, pz)]);
                    scene.add(new THREE.Line(geometry, material));
                }
                updateFloorPlan();
            }
        }

        function updateFloorPlan() {
            let area = 0;
            const n = floorPlanPoints.length;
            if (n >= 3) {
                // Shoelace Formula
                let sum1 = 0, sum2 = 0;
                for (let i = 0; i < n; i++) {
                    sum1 += floorPlanPoints[i].x * floorPlanPoints[(i + 1) % n].z;
                    sum2 += floorPlanPoints[i].z * floorPlanPoints[(i + 1) % n].x;
                }
                area = Math.abs(sum1 - sum2) / 2;
            }
            document.getElementById('area-text').innerHTML = `<i class="fa-solid fa-chart-area"></i> Área: ${area.toFixed(2)} m²`;
            document.getElementById('points-text').innerHTML = `<i class="fa-solid fa-vector-square"></i> Nodos: ${n}`;
            drawCanvasMap();
        }

        function drawCanvasMap() {
            const canvas = document.getElementById('map-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (floorPlanPoints.length < 2) return;

            let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
            floorPlanPoints.forEach(p => { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z); });

            const scale = Math.min(canvas.width / ((maxX - minX) || 1), canvas.height / ((maxZ - minZ) || 1)) * 0.7;
            const offsetX = (canvas.width - ((maxX - minX) * scale)) / 2;
            const offsetZ = (canvas.height - ((maxZ - minZ) * scale)) / 2;

            ctx.beginPath();
            floorPlanPoints.forEach((p, i) => {
                const cx = offsetX + (p.x - minX) * scale, cz = offsetZ + (p.z - minZ) * scale;
                i === 0 ? ctx.moveTo(cx, cz) : ctx.lineTo(cx, cz);
            });
            ctx.strokeStyle = '#2C3E50'; ctx.lineWidth = 3; ctx.stroke();
            if (floorPlanPoints.length > 2) { ctx.fillStyle = 'rgba(51, 193, 255, 0.4)'; ctx.fill(); }
        }

        function animate() { renderer.setAnimationLoop(render); }

        function render(timestamp, frame) {
            const statusBar = document.getElementById('status-bar');
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(viewerSpace => session.requestHitTestSource({ space: viewerSpace }).then(source => hitTestSource = source));
                    session.addEventListener('end', () => { hitTestSourceRequested = false; hitTestSource = null; });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(hitTestResults[0].getPose(referenceSpace).transform.matrix);
                        statusBar.style.display = 'none'; // Tracking OK
                    } else {
                        reticle.visible = false;
                        statusBar.style.display = 'block'; // Tracking Perdido
                    }
                }
            }
            renderer.render(scene, camera);
        }
        
        // --- EXPORTACIÓN A PDF (jsPDF) ---
        document.getElementById('export-btn').addEventListener('click', generarPDF);

        function generarPDF() {
            if (floorPlanPoints.length < 3) {
                alert("Por favor, escanea al menos 3 paredes (esquinas) para generar un plano válido.");
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4'
            });

            // Textos y Metadatos
            doc.setFontSize(22);
            doc.setTextColor(44, 62, 80);
            doc.text("Levantamiento Arquitectónico AR", 20, 25);

            doc.setFontSize(12);
            doc.setTextColor(100, 100, 100);
            const fecha = new Date().toLocaleString('es-ES');
            doc.text(`Fecha del escaneo: ${fecha}`, 20, 35);
            
            const areaTexto = document.getElementById('area-text').innerText;
            doc.text(areaTexto, 20, 42);
            doc.text("Tecnología: WebXR API / Three.js", 20, 49);

            // Línea separadora
            doc.setDrawColor(200, 200, 200);
            doc.line(20, 55, 190, 55);

            // Insertar el plano desde el Canvas
            const canvas = document.getElementById('map-canvas');
            const imgData = canvas.toDataURL('image/png');
            
            // Renderizamos centrado en el documento A4
            doc.addImage(imgData, 'PNG', 30, 70, 150, 150);

            // Descargar el archivo
            doc.save('Plano_Tecnico_AR.pdf');
        }
    </script>
</body>
</html>
