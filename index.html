<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Arquitecto AR - Scanner Pro</title>
    <!-- Librerías Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #f4f4f9; font-family: 'Segoe UI', system-ui, sans-serif; touch-action: none; }
        
        #ar-container { width: 100vw; height: 100vh; display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Capas de Interfaz */
        #home-screen, #instruction-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; }
        
        /* Capa AR (DOM Overlay) */
        #ar-ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 1rem; }
        .interactive { pointer-events: auto; }
        .ui-control { touch-action: none; }

        /* Estilo del botón AR inyectado por Three.js */
        #ARButton { 
            background: #818CF8 !important; 
            color: white !important;
            border-radius: 9999px !important; 
            padding: 16px 32px !important; 
            font-size: 1.125rem !important;
            font-weight: 600 !important;
            border: none !important; 
            box-shadow: 0 10px 15px -3px rgba(129, 140, 248, 0.4) !important;
            bottom: 40px !important;
            position: absolute !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 80% !important;
            max-width: 300px !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }

        /* Etiqueta de medición flotante */
        #measure-label {
            position: absolute;
            background: white;
            color: #1E1B4B;
            padding: 4px 12px;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transform: translate(-50%, -150%);
            transition: opacity 0.2s;
            pointer-events: none;
            display: none;
            border: 2px solid #818CF8;
        }
        
        /* Tool activado en la barra lateral */
        .tool-active {
            background-color: #EEF2FF !important;
            color: #4F46E5 !important;
            border-color: #818CF8 !important;
        }

        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- 1. PANTALLA DE INICIO (HOME) -->
    <div id="home-screen" class="bg-[#F8F9FF] flex flex-col items-center pt-20 px-6">
        <h1 class="text-2xl font-bold text-[#1E1B4B] mb-10 w-full text-center">Selecciona un modo</h1>
        
        <div class="flex flex-col gap-6 w-full max-w-sm">
            <!-- Tarjeta 1: Techo Curvo -->
            <button id="btn-mode-curve" class="bg-white rounded-3xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-indigo-50 flex items-center gap-6 active:scale-95 transition-transform text-left relative overflow-hidden">
                <div class="absolute right-0 top-0 w-32 h-32 bg-purple-50 rounded-full blur-3xl -z-10 transform translate-x-10 -translate-y-10"></div>
                <div class="w-16 h-16 flex-shrink-0">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 70 Q 50 10 85 70" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>
                        <circle cx="15" cy="70" r="4" fill="#8B5CF6"/>
                        <circle cx="50" cy="40" r="4" fill="#8B5CF6"/>
                        <circle cx="85" cy="70" r="4" fill="#8B5CF6"/>
                    </svg>
                </div>
                <div>
                    <h2 class="text-[#4C1D95] text-xl font-semibold">Techo curvo</h2>
                    <p class="text-slate-400 text-sm mt-1">Escaneo de bóvedas y arcos</p>
                </div>
            </button>

            <!-- Tarjeta 2: Habitación Sencilla -->
            <button id="btn-mode-room" class="bg-white rounded-3xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-indigo-50 flex items-center gap-6 active:scale-95 transition-transform text-left relative overflow-hidden">
                <div class="absolute right-0 top-0 w-32 h-32 bg-indigo-50 rounded-full blur-3xl -z-10 transform translate-x-10 -translate-y-10"></div>
                <div class="w-16 h-16 flex-shrink-0">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 20 L90 40 L50 60 L10 40 Z" stroke="#312E81" stroke-width="3" stroke-linejoin="round"/>
                        <path d="M10 40 L10 70 L50 90 L90 70 L90 40" stroke="#312E81" stroke-width="3" stroke-linejoin="round"/>
                        <path d="M50 60 L50 90" stroke="#312E81" stroke-width="3" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div>
                    <h2 class="text-[#312E81] text-xl font-semibold">Habitación sencilla</h2>
                    <p class="text-slate-400 text-sm mt-1">Planos de planta y perímetros</p>
                </div>
            </button>
        </div>
    </div>

    <!-- 2. PANTALLA DE INSTRUCCIONES -->
    <div id="instruction-screen" class="hidden bg-[#F8F9FF] flex flex-col items-center justify-between pt-16 pb-10 px-6">
        <div class="w-full flex justify-center flex-1 items-center relative">
            <div id="inst-step-1" class="text-center fade-in w-full">
                <div class="relative w-48 h-48 mx-auto mb-8">
                    <svg viewBox="0 0 100 100" class="w-full h-full opacity-50" stroke="#818CF8" stroke-width="1.5">
                        <path d="M20 80 L80 80 L95 20 L5 20 Z" fill="none"/>
                        <path d="M35 80 L45 20 M50 80 L50 20 M65 80 L55 20" fill="none"/>
                        <path d="M15 60 L85 60 M10 40 L90 40" fill="none"/>
                    </svg>
                    <i class="fa-solid fa-mobile-screen absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-5xl text-[#312E81] rotate-12 bg-white rounded-xl shadow-lg"></i>
                </div>
                <div class="bg-white rounded-3xl p-6 shadow-xl w-full max-w-sm mx-auto">
                    <h3 id="instruction-title" class="text-[#312E81] text-lg font-medium">Apunta la cámara para mapear el entorno</h3>
                </div>
            </div>
        </div>
        <div id="ar-button-container" class="w-full flex justify-center"></div>
    </div>

    <!-- Contenedor AR 3D -->
    <div id="ar-container"></div>

    <!-- 3. CAPA UI EN AR (DOM Overlay) -->
    <div id="ar-ui-layer" class="hidden">
        
        <div id="measure-label">0.00m</div>

        <!-- Toolbar Superior -->
        <div class="flex justify-between items-start w-full">
            <button id="btn-reset" class="interactive ui-control bg-white/90 backdrop-blur text-slate-600 p-3 rounded-full shadow-lg border border-slate-100 active:bg-slate-100 flex items-center justify-center w-12 h-12">
                <i class="fa-solid fa-trash-can"></i>
            </button>
            <button id="btn-export" class="interactive ui-control bg-[#4F46E5] text-white px-5 py-3 rounded-full shadow-[0_5px_15px_rgba(79,70,229,0.4)] font-bold active:scale-95 flex items-center gap-2">
                <i class="fa-solid fa-file-pdf"></i> Generar PDF
            </button>
        </div>

        <!-- TOOLBAR LATERAL PRO (Se inyecta dinámicamente) -->
        <div id="pro-toolbar" class="interactive absolute left-4 top-1/2 transform -translate-y-1/2 flex flex-col gap-3 bg-white/90 backdrop-blur-md p-2 rounded-2xl shadow-xl border border-slate-200">
            <!-- Inyectado vía JS -->
        </div>

        <!-- Panel de Estado / Minimapa -->
        <div class="interactive ui-control absolute top-16 right-4 bg-white/90 backdrop-blur-md rounded-xl p-3 shadow-xl border border-slate-100 origin-top-right flex flex-col items-end">
            <canvas id="map-canvas" width="120" height="120" class="bg-slate-50 rounded-lg border border-slate-200 mb-2"></canvas>
            <div id="metrics-panel" class="text-right w-full">
                <p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1" id="metric-label-1">Área</p>
                <div class="text-[#312E81] font-bold text-lg leading-none mb-2" id="area-text">0.00 m²</div>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1" id="metric-label-2">Perímetro</p>
                <div class="text-[#4F46E5] font-bold text-lg leading-none" id="perim-text">0.00 m</div>
            </div>
        </div>

        <!-- Tarjeta Flotante Inferior -->
        <div class="interactive flex flex-col items-center w-full mb-6 mt-auto">
            <div id="ar-instruction-card" class="bg-white rounded-3xl p-5 shadow-xl w-full max-w-sm text-center transition-all duration-300">
                <h3 id="ar-instruction-text" class="text-[#312E81] text-sm font-medium mb-3">Escaneando superficie...</h3>
                
                <button id="btn-add-node" class="ui-control hidden mx-auto bg-[#818CF8] hover:bg-[#6366F1] text-white rounded-full px-8 py-3 font-semibold text-lg shadow-[0_5px_15px_rgba(129,140,248,0.4)] active:scale-95 transition-transform flex items-center justify-center gap-2 w-full">
                    <i class="fa-solid fa-crosshairs"></i> <span id="btn-add-text">Marcar Punto</span>
                </button>
                
                <div id="ar-loading-bar" class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden mt-2">
                    <div class="w-1/2 h-full bg-[#818CF8] animate-pulse rounded-full"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js';

        // --- Estado Global de la App ---
        let appMode = 'room'; // 'room' | 'curve'
        let currentTool = 'wall'; // 'wall' | 'door' | 'curve_node'
        
        let camera, scene, renderer, controller, reticle;
        let hitTestSource = null, hitTestSourceRequested = false;
        
        let planPoints = []; // Nodos registrados
        const SNAP_TOLERANCE = 0.15; // 15cm para room mode
        
        let meshesPoints = [];
        let meshesLines = [];
        let polygonMesh = null; // Para cuarto cerrado
        let splineMesh = null;  // Para curva
        let isShapeClosed = false;
        let isSurfaceFound = false;

        // Elementos UI
        const measureLabel = document.getElementById('measure-label');
        const instructionText = document.getElementById('ar-instruction-text');
        const btnAddNode = document.getElementById('btn-add-node');
        const btnAddText = document.getElementById('btn-add-text');
        const loadingBar = document.getElementById('ar-loading-bar');
        const proToolbar = document.getElementById('pro-toolbar');

        // --- Configuración de Modos ---
        document.getElementById('btn-mode-room').addEventListener('click', () => {
            appMode = 'room';
            currentTool = 'wall';
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('instruction-screen').classList.remove('hidden');
            setupToolbar();
        });

        document.getElementById('btn-mode-curve').addEventListener('click', () => {
            appMode = 'curve';
            currentTool = 'curve_node';
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('instruction-screen').classList.remove('hidden');
            document.getElementById('instruction-title').innerText = "Apunta a la base del arco o techo";
            setupToolbar();
        });

        function setupToolbar() {
            proToolbar.innerHTML = '';
            
            if (appMode === 'room') {
                document.getElementById('metric-label-1').innerText = "Área";
                document.getElementById('metric-label-2').innerText = "Perímetro";
                
                proToolbar.innerHTML = `
                    <button class="tool-btn tool-active ui-control w-12 h-12 flex flex-col items-center justify-center rounded-xl text-slate-500 border-2 border-transparent transition-all" data-tool="wall">
                        <i class="fa-solid fa-layer-group text-lg"></i>
                        <span class="text-[9px] font-bold mt-1">Muro</span>
                    </button>
                    <button class="tool-btn ui-control w-12 h-12 flex flex-col items-center justify-center rounded-xl text-slate-500 border-2 border-transparent transition-all" data-tool="door">
                        <i class="fa-door-open fa-solid text-lg"></i>
                        <span class="text-[9px] font-bold mt-1">Puerta</span>
                    </button>
                    <button class="tool-btn ui-control w-12 h-12 flex flex-col items-center justify-center rounded-xl text-slate-500 border-2 border-transparent transition-all" data-tool="undo">
                        <i class="fa-solid fa-rotate-left text-lg"></i>
                        <span class="text-[9px] font-bold mt-1">Deshacer</span>
                    </button>
                `;
            } else if (appMode === 'curve') {
                document.getElementById('metric-label-1').innerText = "Arco Total";
                document.getElementById('metric-label-2').innerText = "Nodos";
                
                proToolbar.innerHTML = `
                    <button class="tool-btn tool-active ui-control w-12 h-12 flex flex-col items-center justify-center rounded-xl text-slate-500 border-2 border-transparent transition-all" data-tool="curve_node">
                        <i class="fa-solid fa-bezier-curve text-lg"></i>
                        <span class="text-[9px] font-bold mt-1">Punto</span>
                    </button>
                    <button class="tool-btn ui-control w-12 h-12 flex flex-col items-center justify-center rounded-xl text-slate-500 border-2 border-transparent transition-all" data-tool="undo">
                        <i class="fa-solid fa-rotate-left text-lg"></i>
                        <span class="text-[9px] font-bold mt-1">Deshacer</span>
                    </button>
                `;
            }

            // Listeners del toolbar
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.addEventListener('beforexrselect', (ev) => ev.preventDefault());
                btn.addEventListener('click', (e) => {
                    const tool = e.currentTarget.dataset.tool;
                    if (tool === 'undo') {
                        undoLastPoint();
                        return;
                    }
                    
                    // Update active class
                    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('tool-active'));
                    e.currentTarget.classList.add('tool-active');
                    
                    currentTool = tool;
                    if (tool === 'door') {
                        btnAddText.innerText = "Marcar Puerta";
                        btnAddNode.className = btnAddNode.className.replace('bg-[#818CF8]', 'bg-amber-500').replace('hover:bg-[#6366F1]', 'hover:bg-amber-600');
                    } else {
                        btnAddText.innerText = "Marcar Punto";
                        btnAddNode.className = btnAddNode.className.replace('bg-amber-500', 'bg-[#818CF8]').replace('hover:bg-amber-600', 'hover:bg-[#6366F1]');
                    }
                });
            });
        }

        // --- Inicialización 3D ---
        init();
        animate();

        function init() {
            const container = document.getElementById('ar-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(1, 5, 1);
            scene.add(dirLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);
            
            const arButtonEl = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ar-ui-layer') }
            });
            arButtonEl.innerHTML = 'Iniciar Scanner AR <i class="fa-solid fa-camera ml-2"></i>';
            arButtonEl.addEventListener('click', () => {
                document.getElementById('instruction-screen').classList.add('hidden');
                document.getElementById('ar-ui-layer').classList.remove('hidden');
            });
            document.getElementById('ar-button-container').appendChild(arButtonEl);

            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            // Retícula Pro (Ajustable a superficies)
            const reticleGroup = new THREE.Group();
            const ringGeom = new THREE.RingGeometry(0.08, 0.085, 32).rotateX(-Math.PI / 2);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9, depthTest: false });
            reticleGroup.add(new THREE.Mesh(ringGeom, ringMat));
            
            const fillGeom = new THREE.CircleGeometry(0.08, 32).rotateX(-Math.PI / 2);
            const fillMat = new THREE.MeshBasicMaterial({ color: 0x818CF8, transparent: true, opacity: 0.4, depthTest: false });
            reticleGroup.add(new THREE.Mesh(fillGeom, fillMat));

            const dot = new THREE.Mesh(new THREE.CircleGeometry(0.015, 16).rotateX(-Math.PI / 2), new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false }));
            dot.position.y = 0.001; 
            reticleGroup.add(dot);

            reticle = reticleGroup;
            reticle.matrixAutoUpdate = false; 
            reticle.visible = false;
            reticle.renderOrder = 999; 
            scene.add(reticle);

            btnAddNode.addEventListener('beforexrselect', (ev) => ev.preventDefault());
            btnAddNode.addEventListener('click', onSelect);
            
            document.getElementById('btn-reset').addEventListener('beforexrselect', (ev) => ev.preventDefault());
            document.getElementById('btn-reset').addEventListener('click', resetScanner);
            
            document.getElementById('btn-export').addEventListener('beforexrselect', (ev) => ev.preventDefault());
            document.getElementById('btn-export').addEventListener('click', closeAndExport);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Lógica AR y Captura de Puntos ---
        function onSelect() {
            if (isShapeClosed) return;
            if (!reticle.visible) return;

            const position = new THREE.Vector3();
            position.setFromMatrixPosition(reticle.matrix);

            let px = position.x, pz = position.z, py = position.y; 

            if (appMode === 'room') {
                // Snapping sólo en modo cuarto (forzar ortogonalidad)
                if (planPoints.length > 0) {
                    const lastP = planPoints[planPoints.length - 1];
                    if (Math.abs(px - lastP.x) < SNAP_TOLERANCE) px = lastP.x; 
                    if (Math.abs(pz - lastP.z) < SNAP_TOLERANCE) pz = lastP.z;
                }
                
                planPoints.push({ x: px, y: py, z: pz, type: currentTool });
                
                // Dibujar Esfera (Nodo)
                const nodeColor = currentTool === 'door' ? 0xf59e0b : 0xffffff;
                const sphereMat = new THREE.MeshStandardMaterial({ color: nodeColor, roughness: 0.2, metalness: 0.8 });
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.02, 16, 16), sphereMat);
                sphere.position.set(px, py, pz);
                scene.add(sphere);
                meshesPoints.push(sphere);

                // Dibujar Muro o Puerta
                if (planPoints.length > 1) {
                    const lastP = planPoints[planPoints.length - 2];
                    const isDoor = currentTool === 'door';
                    const material = new THREE.LineBasicMaterial({ 
                        color: isDoor ? 0xf59e0b : 0xffffff, 
                        linewidth: isDoor ? 2 : 5 
                    });
                    const geometry = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(lastP.x, py, lastP.z), 
                        new THREE.Vector3(px, py, pz)
                    ]);
                    
                    if (isDoor) {
                        // Línea punteada para puerta
                        const line = new THREE.LineSegments(geometry, new THREE.LineDashedMaterial({ color: 0xf59e0b, dashSize: 0.1, gapSize: 0.1 }));
                        line.computeLineDistances();
                        scene.add(line);
                        meshesLines.push(line);
                    } else {
                        const line = new THREE.Line(geometry, material);
                        scene.add(line);
                        meshesLines.push(line);
                    }
                }
                updateMetrics();
                instructionText.innerText = "Marca la siguiente esquina o puerta.";

            } else if (appMode === 'curve') {
                // Modo Curva: Registro libre 3D
                planPoints.push({ x: px, y: py, z: pz });
                
                const sphereMat = new THREE.MeshStandardMaterial({ color: 0x8B5CF6, roughness: 0.1 });
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.015, 16, 16), sphereMat);
                sphere.position.set(px, py, pz);
                scene.add(sphere);
                meshesPoints.push(sphere);

                updateCurve3D();
                updateMetrics();
                instructionText.innerText = "Añade más puntos siguiendo la curva.";
            }
        }

        // Generación de Curva Suave (Catmull-Rom)
        function updateCurve3D() {
            if (planPoints.length < 2) return;
            if (splineMesh) scene.remove(splineMesh);
            
            const vecs = planPoints.map(p => new THREE.Vector3(p.x, p.y, p.z));
            const curve = new THREE.CatmullRomCurve3(vecs);
            
            const points = curve.getPoints(50); // Interpolación suave
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            
            // Material luminoso tipo neón para la curva
            const material = new THREE.LineBasicMaterial({ color: 0x8B5CF6, linewidth: 6 });
            splineMesh = new THREE.Line(geometry, material);
            scene.add(splineMesh);
        }

        // --- Edición y Reseteo ---
        function undoLastPoint() {
            if (isShapeClosed || planPoints.length === 0) return;
            
            planPoints.pop();
            const pMesh = meshesPoints.pop(); if (pMesh) scene.remove(pMesh);
            
            if (appMode === 'room') {
                if (meshesLines.length > 0) { const lMesh = meshesLines.pop(); scene.remove(lMesh); }
            } else if (appMode === 'curve') {
                updateCurve3D(); // Re-dibujar curva con n-1 puntos
            }
            updateMetrics();
        }

        function resetScanner() {
            planPoints = [];
            meshesPoints.forEach(m => scene.remove(m));
            meshesLines.forEach(m => scene.remove(m));
            if (polygonMesh) scene.remove(polygonMesh);
            if (splineMesh) scene.remove(splineMesh);
            
            meshesPoints = []; meshesLines = []; 
            polygonMesh = null; splineMesh = null;
            isShapeClosed = false;
            
            btnAddNode.classList.remove('hidden');
            updateMetrics();
            instructionText.innerText = "Escáner reiniciado. Comienza de nuevo.";
        }

        // --- Finalizar y Exportar ---
        function closeAndExport() {
            if (appMode === 'room') {
                const n = planPoints.length;
                if (n < 3) { alert("Dibuja al menos 3 esquinas."); return; }
                
                if (!isShapeClosed) {
                    // Cerrar habitación
                    const firstP = planPoints[0];
                    const lastP = planPoints[n - 1];
                    const material = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 5 });
                    const geometry = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(lastP.x, lastP.y, lastP.z), 
                        new THREE.Vector3(firstP.x, firstP.y, firstP.z)
                    ]);
                    const line = new THREE.Line(geometry, material);
                    scene.add(line);
                    meshesLines.push(line);

                    // Polígono del suelo
                    const shape = new THREE.Shape();
                    shape.moveTo(planPoints[0].x, -planPoints[0].z); 
                    for (let i = 1; i < n; i++) shape.lineTo(planPoints[i].x, -planPoints[i].z);

                    const polyGeom = new THREE.ShapeGeometry(shape);
                    polyGeom.rotateX(Math.PI / 2); 
                    const polyMat = new THREE.MeshBasicMaterial({ color: 0x818CF8, opacity: 0.2, transparent: true, side: THREE.DoubleSide });
                    polygonMesh = new THREE.Mesh(polyGeom, polyMat);
                    polygonMesh.position.y = firstP.y + 0.001; 
                    scene.add(polygonMesh);

                    isShapeClosed = true;
                    btnAddNode.classList.add('hidden');
                    updateMetrics();
                }
            } else {
                // Modo Curva: Simplemente finalizamos
                if (planPoints.length < 2) { alert("Traza al menos 2 puntos para la curva."); return; }
                isShapeClosed = true;
                btnAddNode.classList.add('hidden');
            }
            
            instructionText.innerText = "¡Mapeo completado! Generando reporte...";
            setTimeout(generarPDF, 1000);
        }

        // --- Cálculos Matemáticos ---
        function updateMetrics() {
            const n = planPoints.length;
            
            if (appMode === 'room') {
                let area = 0; let perim = 0;
                
                // Perímetro
                for (let i = 1; i < n; i++) {
                    perim += Math.hypot(planPoints[i].x - planPoints[i-1].x, planPoints[i].z - planPoints[i-1].z);
                }
                if (isShapeClosed && n >= 3) {
                    perim += Math.hypot(planPoints[0].x - planPoints[n-1].x, planPoints[0].z - planPoints[n-1].z);
                }

                // Área (Fórmula del topógrafo / Shoelace)
                if (n >= 3) {
                    let sum1 = 0, sum2 = 0;
                    for (let i = 0; i < n; i++) {
                        sum1 += planPoints[i].x * planPoints[(i + 1) % n].z;
                        sum2 += planPoints[i].z * planPoints[(i + 1) % n].x;
                    }
                    area = Math.abs(sum1 - sum2) / 2;
                }

                document.getElementById('area-text').innerText = `${area.toFixed(2)} m²`;
                document.getElementById('perim-text').innerText = `${perim.toFixed(2)} m`;
            
            } else if (appMode === 'curve') {
                let arcLength = 0;
                if (n >= 2) {
                    const vecs = planPoints.map(p => new THREE.Vector3(p.x, p.y, p.z));
                    const curve = new THREE.CatmullRomCurve3(vecs);
                    arcLength = curve.getLength();
                }
                
                document.getElementById('area-text').innerText = `${arcLength.toFixed(2)} m`;
                document.getElementById('perim-text').innerText = `${n}`; // Número de nodos
            }
            
            drawCanvasMap();
        }

        // --- Render Loop (Tracking y HUD) ---
        function animate() { renderer.setAnimationLoop(render); }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(viewerSpace => {
                        session.requestHitTestSource({ space: viewerSpace }).then(source => hitTestSource = source);
                    });
                    session.addEventListener('end', () => { 
                        hitTestSourceRequested = false; hitTestSource = null; 
                        document.getElementById('ar-ui-layer').classList.add('hidden');
                        document.getElementById('home-screen').classList.remove('hidden');
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource && !isShapeClosed) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        reticle.visible = true;
                        
                        // Si es modo cuarto, rastreamos planos horizontales (suelo)
                        // Si es curvo, rastreamos en 3D cualquier superficie interceptada
                        reticle.matrix.fromArray(hitTestResults[0].getPose(referenceSpace).transform.matrix);
                        
                        if (!isSurfaceFound) {
                            isSurfaceFound = true;
                            instructionText.innerText = "Superficie lista. Comienza a marcar.";
                            loadingBar.classList.add('hidden');
                            btnAddNode.classList.remove('hidden');
                        }

                        // HUD: Distancia en vivo
                        if (planPoints.length > 0) {
                            const lastP = planPoints[planPoints.length - 1];
                            const currentPos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                            const distance = currentPos.distanceTo(new THREE.Vector3(lastP.x, currentPos.y, lastP.z));
                            
                            const screenPos = currentPos.clone().project(camera);
                            const x = (screenPos.x * .5 + .5) * window.innerWidth;
                            const y = (screenPos.y * -.5 + .5) * window.innerHeight;
                            
                            measureLabel.innerText = `${distance.toFixed(2)} m`;
                            measureLabel.style.display = 'block';
                            measureLabel.style.left = `${x}px`;
                            measureLabel.style.top = `${y - 40}px`;
                        } else {
                            measureLabel.style.display = 'none';
                        }
                    } else {
                        reticle.visible = false;
                        measureLabel.style.display = 'none';
                    }
                }
            }
            renderer.render(scene, camera);
        }

        // --- Minimapa ---
        function drawCanvasMap(targetCanvas = null) {
            const canvas = targetCanvas || document.getElementById('map-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (targetCanvas) { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
            if (planPoints.length === 0) return;

            // Para curvo visualizamos la planta (X,Z) también
            let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
            planPoints.forEach(p => { 
                minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); 
                minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z); 
            });

            const scale = Math.min(canvas.width / ((maxX - minX) || 1), canvas.height / ((maxZ - minZ) || 1)) * 0.6;
            const offsetX = (canvas.width - ((maxX - minX) * scale)) / 2;
            const offsetZ = (canvas.height - ((maxZ - minZ) * scale)) / 2;

            ctx.beginPath();
            planPoints.forEach((p, i) => {
                const cx = offsetX + (p.x - minX) * scale, cz = offsetZ + (p.z - minZ) * scale;
                i === 0 ? ctx.moveTo(cx, cz) : ctx.lineTo(cx, cz);
            });
            
            if (appMode === 'room' && isShapeClosed) {
                ctx.closePath();
                ctx.fillStyle = 'rgba(79, 70, 229, 0.2)'; 
                ctx.fill();
            }

            // Dibujar Trazos
            ctx.strokeStyle = appMode === 'curve' ? '#8B5CF6' : '#312E81'; 
            ctx.lineWidth = targetCanvas ? 4 : 2; 
            
            if (appMode === 'curve') {
                ctx.setLineDash([5, 5]); // Curva punteada en vista 2D
            } else {
                ctx.setLineDash([]); // Sólido para habitación
            }
            ctx.stroke();

            // Dibujar Nodos
            ctx.setLineDash([]); 
            planPoints.forEach((p, i) => {
                const cx = offsetX + (p.x - minX) * scale, cz = offsetZ + (p.z - minZ) * scale;
                ctx.beginPath(); ctx.arc(cx, cz, targetCanvas ? 5 : 3, 0, 2 * Math.PI);
                ctx.fillStyle = (p.type === 'door') ? '#F59E0B' : (appMode === 'curve' ? '#8B5CF6' : '#4F46E5');
                ctx.fill();
            });
        }

        // --- Exportación Profesional a PDF ---
        function generarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

            const isCurve = appMode === 'curve';
            const themeColor = isCurve ? [139, 92, 246] : [49, 46, 129]; // Purple vs Indigo

            // Cabecera
            doc.setFillColor(themeColor[0], themeColor[1], themeColor[2]); 
            doc.rect(0, 0, 210, 35, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text(isCurve ? "Reporte de Bóveda / Techo Curvo AR" : "Levantamiento Arquitectónico AR", 20, 22);

            doc.setTextColor(80, 80, 80);
            doc.setFontSize(10);
            doc.text(`Fecha del escaneo: ${new Date().toLocaleString('es-ES')}`, 20, 45);
            
            // Métricas Clave
            doc.setDrawColor(220, 220, 220);
            doc.roundedRect(20, 55, 80, 25, 3, 3, 'S');
            doc.roundedRect(110, 55, 80, 25, 3, 3, 'S');

            doc.setFontSize(11);
            doc.setTextColor(100, 100, 100);
            doc.text(isCurve ? "Desarrollo de Arco (Longitud):" : "Área Total:", 25, 63);
            doc.text(isCurve ? "Nodos de Control Registrados:" : "Perímetro Perimetral:", 115, 63);

            doc.setFontSize(16);
            doc.setTextColor(themeColor[0], themeColor[1], themeColor[2]);
            doc.text(document.getElementById('area-text').innerText, 25, 73);
            doc.text(document.getElementById('perim-text').innerText, 115, 73);

            // Plano 2D
            doc.setFontSize(14);
            doc.setTextColor(50, 50, 50);
            doc.text("Plano de Planta (Vista Superior Ortogonal)", 20, 95);

            const hiResCanvas = document.createElement('canvas');
            hiResCanvas.width = 1200; hiResCanvas.height = 1200;
            drawCanvasMap(hiResCanvas);
            
            doc.setDrawColor(230, 230, 230);
            doc.rect(20, 105, 170, 170, 'S');
            doc.addImage(hiResCanvas.toDataURL('image/png'), 'PNG', 20, 105, 170, 170);

            // Notas técnicas
            if (!isCurve) {
                doc.setFontSize(9);
                doc.setTextColor(150, 150, 150);
                doc.text("* Las líneas anaranjadas (si existen) denotan accesos o puertas marcadas.", 20, 280);
            }

            doc.save(`Plano_${isCurve ? 'Boveda' : 'Habitacion'}_AR.pdf`);
        }
    </script>
