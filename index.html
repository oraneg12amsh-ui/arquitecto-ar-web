<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Arquitecto AR - Scanner Pro</title>
    <!-- Librerías Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        body { margin: 0; overflow: hidden; background-color: #F4F5F9; font-family: 'Nunito', system-ui, sans-serif; touch-action: none; }
        
        #ar-container { width: 100vw; height: 100vh; display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Capas de Interfaz */
        #home-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; background: linear-gradient(180deg, #F8F9FA 0%, #E9ECF5 100%); }
        
        /* Capa AR (DOM Overlay) */
        #ar-ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; padding: 1rem; }
        .interactive { pointer-events: auto; }
        .ui-control { touch-action: none; }

        /* Estilo del botón AR inyectado por Three.js */
        #ARButton { 
            background: #93C5FD !important; /* Soft blue */
            color: #1E3A8A !important;
            border-radius: 9999px !important; 
            padding: 16px 32px !important; 
            font-size: 1.125rem !important;
            font-family: 'Nunito', sans-serif !important;
            font-weight: 700 !important;
            border: none !important; 
            box-shadow: 0 10px 25px -5px rgba(147, 197, 253, 0.5) !important;
            bottom: 40px !important;
            position: absolute !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 80% !important;
            max-width: 320px !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            transition: all 0.3s ease !important;
        }

        /* Etiqueta de medición flotante estilo PILL */
        .measure-pill {
            position: absolute;
            background: white;
            color: #312E81;
            padding: 6px 16px;
            border-radius: 9999px;
            font-weight: 800;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
            white-space: nowrap;
            letter-spacing: 0.5px;
            z-index: 20;
        }
        
        /* Puntero de la etiqueta */
        .measure-pill::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -6px;
            margin-top: -6px;
            border-width: 6px 6px 6px 0;
            border-style: solid;
            border-color: transparent white transparent transparent;
        }

        /* Animaciones */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .pulse-soft { animation: pulseSoft 2s infinite; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseSoft { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

        /* Botón Inferior AR (Translúcido profesional) */
        .btn-ar-action {
            background: rgba(139, 92, 246, 0.85); /* Purple translucent */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(109, 40, 217, 0.3);
        }

        /* Scan Graphic Animation */
        .scan-line {
            animation: scanMove 2s linear infinite;
        }
        @keyframes scanMove {
            0% { transform: translateY(-20px) rotate(-15deg); opacity: 0;}
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(80px) rotate(-15deg); opacity: 0;}
        }
    </style>
</head>
<body>

    <!-- 1. PANTALLA DE INICIO (HOME) -->
    <div id="home-screen" class="flex flex-col items-center pt-24 px-6 relative overflow-hidden">
        <!-- Decoración de fondo -->
        <div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-64 h-64 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>

        <div class="flex flex-col gap-6 w-full max-w-sm z-10">
            <!-- Tarjeta 1: Techo Curvo -->
            <button id="btn-mode-curve" class="bg-white rounded-[2rem] p-6 shadow-[0_10px_40px_rgba(0,0,0,0.04)] border border-white flex items-center gap-5 active:scale-95 transition-transform text-left relative overflow-hidden">
                <div class="w-20 h-20 flex-shrink-0 bg-[#F5F3FF] rounded-2xl p-3 flex items-center justify-center">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                        <path d="M15 75 Q 50 15 85 75" stroke="#7C3AED" stroke-width="4" stroke-linecap="round"/>
                        <path d="M15 75 L 15 85 M 85 75 L 85 85" stroke="#7C3AED" stroke-width="4" stroke-linecap="round"/>
                        <rect x="25" y="35" width="15" height="25" stroke="#7C3AED" stroke-width="3" transform="rotate(25 32 47)"/>
                        <rect x="60" y="35" width="15" height="25" stroke="#7C3AED" stroke-width="3" transform="rotate(-25 67 47)"/>
                    </svg>
                </div>
                <div>
                    <span class="bg-[#8B5CF6] text-white text-[10px] uppercase tracking-widest font-bold px-3 py-1 rounded-full mb-1 inline-block">beta</span>
                    <h2 class="text-[#312E81] text-xl font-bold leading-tight">Techo curvo</h2>
                    <p class="text-slate-400 text-sm mt-1 font-medium">(Modo manual)</p>
                </div>
            </button>

            <!-- Tarjeta 2: Habitación Sencilla -->
            <button id="btn-mode-room" class="bg-white rounded-[2rem] p-6 shadow-[0_10px_40px_rgba(0,0,0,0.04)] border border-white flex items-center gap-5 active:scale-95 transition-transform text-left relative overflow-hidden">
                <div class="w-20 h-20 flex-shrink-0 bg-[#EFF6FF] rounded-2xl p-3 flex items-center justify-center">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                        <path d="M50 20 L85 40 L50 60 L15 40 Z" stroke="#1E3A8A" stroke-width="3" stroke-linejoin="round"/>
                        <path d="M15 40 L15 70 L50 90 L85 70 L85 40" stroke="#1E3A8A" stroke-width="3" stroke-linejoin="round"/>
                        <path d="M50 60 L50 90" stroke="#1E3A8A" stroke-width="3" stroke-linejoin="round"/>
                        <rect x="22" y="55" width="8" height="15" stroke="#1E3A8A" stroke-width="2" transform="skewY(25)"/>
                        <rect x="70" y="44" width="8" height="15" stroke="#1E3A8A" stroke-width="2" transform="skewY(-25)"/>
                    </svg>
                </div>
                <div>
                    <h2 class="text-[#312E81] text-xl font-bold leading-tight">Habitación<br>sencilla</h2>
                </div>
            </button>
        </div>
        
        <div id="ar-button-container" class="w-full flex justify-center mt-12 z-10"></div>
    </div>

    <!-- Contenedor AR 3D -->
    <div id="ar-container"></div>

    <!-- 3. CAPA UI EN AR (DOM Overlay) -->
    <div id="ar-ui-layer" class="hidden">
        
        <!-- Etiqueta de medición 3D a 2D -->
        <div id="measure-label" class="measure-pill">0.00 m</div>

        <!-- Toolbar Superior (Botón Salir) -->
        <div class="flex justify-between items-start w-full">
            <button id="btn-exit" class="interactive ui-control bg-white/90 backdrop-blur-md text-[#312E81] w-12 h-12 rounded-full shadow-lg flex items-center justify-center active:scale-90 transition-transform">
                <i class="fa-solid fa-arrow-left-long text-xl"></i>
            </button>
            <button id="btn-export" class="interactive ui-control bg-white/90 backdrop-blur-md text-[#312E81] w-12 h-12 rounded-full shadow-lg flex items-center justify-center active:scale-90 transition-transform hidden">
                <i class="fa-solid fa-check text-xl text-emerald-600"></i>
            </button>
        </div>

        <!-- Overlay de Instrucciones Iniciales (Cámara a Piso) -->
        <div id="ar-scan-overlay" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-0">
            <!-- Gráfico del teléfono escaneando -->
            <div class="relative w-64 h-64 mb-10 flex items-center justify-center">
                <!-- Grid perspective -->
                <svg viewBox="0 0 200 200" class="absolute w-full h-full opacity-60" stroke="#FFFFFF" stroke-width="2">
                    <path d="M20 160 L180 160 L150 60 L50 60 Z" fill="none"/>
                    <path d="M60 160 L80 60 M100 160 L100 60 M140 160 L120 60" fill="none"/>
                    <path d="M35 110 L165 110 M45 85 L155 85" fill="none"/>
                    <circle cx="100" cy="110" r="4" fill="#FFFFFF"/>
                    <circle cx="140" cy="135" r="3" fill="#FFFFFF"/>
                    <circle cx="70" cy="90" r="2" fill="#FFFFFF"/>
                </svg>
                <!-- Teléfono animado -->
                <div class="absolute pulse-soft">
                    <svg width="60" height="100" viewBox="0 0 60 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="transform rotate-[-15deg]">
                        <rect x="2" y="2" width="56" height="96" rx="10" stroke="white" stroke-width="4"/>
                        <rect x="6" y="6" width="48" height="88" rx="6" stroke="white" stroke-width="2"/>
                    </svg>
                </div>
            </div>
            
            <!-- Etiqueta de instrucción -->
            <div class="bg-white px-8 py-4 rounded-3xl shadow-2xl text-center max-w-[80%] fade-in">
                <p id="ar-scan-text" class="text-[#312E81] font-bold text-lg">1. Apunta la cámara a un piso</p>
            </div>
        </div>

        <!-- Tarjeta de Mensaje Superior (Para cuando ya detecta) -->
        <div id="ar-top-msg" class="absolute top-20 left-1/2 transform -translate-x-1/2 bg-white/90 backdrop-blur-md px-6 py-3 rounded-full shadow-lg text-center hidden slide-up interactive">
            <p id="ar-top-msg-text" class="text-[#312E81] font-bold text-base">Comience a marcar las esquinas! PISO</p>
        </div>

        <!-- Botón de Acción Principal Flotante (Abajo) -->
        <div class="absolute bottom-10 left-0 w-full flex justify-center interactive">
            <button id="btn-main-action" class="ui-control btn-ar-action text-white rounded-[2rem] px-12 py-4 font-bold text-xl active:scale-95 transition-all duration-200 hidden tracking-wide">
                comienzo
            </button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js';

        // --- Estado Global ---
        let appMode = 'room'; 
        let arState = 'scanning'; // 'scanning', 'ready', 'drawing'
        
        let camera, scene, renderer, controller, reticle;
        let hitTestSource = null, hitTestSourceRequested = false;
        
        let planPoints = []; 
        let meshesPoints = [];
        let meshesLines = [];
        let polygonMesh = null; 
        let gridHelper = null; // Cuadrícula del piso

        // Elementos UI
        const measureLabel = document.getElementById('measure-label');
        const scanOverlay = document.getElementById('ar-scan-overlay');
        const scanText = document.getElementById('ar-scan-text');
        const topMsg = document.getElementById('ar-top-msg');
        const topMsgText = document.getElementById('ar-top-msg-text');
        const btnMainAction = document.getElementById('btn-main-action');
        const btnExport = document.getElementById('btn-export');

        // --- Configuración de Interfaz ---
        document.getElementById('btn-mode-room').addEventListener('click', () => { appMode = 'room'; });
        document.getElementById('btn-mode-curve').addEventListener('click', () => { appMode = 'curve'; });

        // --- Inicialización 3D ---
        init();
        animate();

        function init() {
            const container = document.getElementById('ar-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(1, 5, 1);
            scene.add(dirLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);
            
            // Botón nativo de AR (Ocultamos Home al entrar)
            const arButtonEl = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ar-ui-layer') }
            });
            arButtonEl.innerHTML = 'Detectar el piso';
            arButtonEl.addEventListener('click', () => {
                document.getElementById('home-screen').classList.add('hidden');
                document.getElementById('ar-ui-layer').classList.remove('hidden');
                resetARState();
            });
            document.getElementById('ar-button-container').appendChild(arButtonEl);

            controller = renderer.xr.getController(0);
            scene.add(controller);

            // --- DISEÑO DEL SENSOR PROFESIONAL (Igual a la captura) ---
            const reticleGroup = new THREE.Group();
            
            // 1. Anillo exterior fino
            const ringGeom = new THREE.RingGeometry(0.08, 0.085, 32).rotateX(-Math.PI / 2);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9, depthTest: false });
            reticleGroup.add(new THREE.Mesh(ringGeom, ringMat));
            
            // 2. Líneas punteadas interiores (Crosshair)
            const dashedMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.01, gapSize: 0.01, transparent: true, opacity: 0.7, depthTest: false });
            const crossX = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-0.08, 0, 0), new THREE.Vector3(0.08, 0, 0)]);
            const crossZ = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, -0.08), new THREE.Vector3(0, 0, 0.08)]);
            const lineX = new THREE.Line(crossX, dashedMat); lineX.computeLineDistances();
            const lineZ = new THREE.Line(crossZ, dashedMat); lineZ.computeLineDistances();
            reticleGroup.add(lineX, lineZ);

            // 3. Punto central oscuro (El centro del blanco)
            const dot = new THREE.Mesh(new THREE.CircleGeometry(0.015, 16).rotateX(-Math.PI / 2), new THREE.MeshBasicMaterial({ color: 0x111111, depthTest: false }));
            dot.position.y = 0.001; 
            reticleGroup.add(dot);

            // 4. Línea Vertical Infinita (Guía de pared)
            const vLineGeom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 3, 0)]); // 3 metros de alto
            const vLineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6, linewidth: 2, depthTest: false });
            reticleGroup.add(new THREE.Line(vLineGeom, vLineMat));

            reticle = reticleGroup;
            reticle.matrixAutoUpdate = false; 
            reticle.visible = false;
            reticle.renderOrder = 999; 
            scene.add(reticle);

            // --- Cuadrícula del Piso (Oculta al inicio) ---
            // Una cuadrícula inmensa que da el efecto de superficie rastreada
            gridHelper = new THREE.GridHelper(50, 200, 0xffffff, 0xffffff);
            gridHelper.material.opacity = 0.2;
            gridHelper.material.transparent = true;
            gridHelper.visible = false;
            scene.add(gridHelper);

            // Eventos UI en AR
            btnMainAction.addEventListener('beforexrselect', (ev) => ev.preventDefault());
            btnMainAction.addEventListener('click', handleMainAction);
            
            document.getElementById('btn-exit').addEventListener('beforexrselect', (ev) => ev.preventDefault());
            document.getElementById('btn-exit').addEventListener('click', () => renderer.xr.getSession()?.end());
            
            btnExport.addEventListener('beforexrselect', (ev) => ev.preventDefault());
            btnExport.addEventListener('click', generarPDF);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Máquina de Estados de AR ---
        function resetARState() {
            arState = 'scanning';
            planPoints = [];
            meshesPoints.forEach(m => scene.remove(m));
            meshesLines.forEach(m => scene.remove(m));
            if (polygonMesh) scene.remove(polygonMesh);
            meshesPoints = []; meshesLines = []; polygonMesh = null;
            
            gridHelper.visible = false;
            scanOverlay.classList.remove('hidden');
            topMsg.classList.add('hidden');
            btnMainAction.classList.add('hidden');
            btnExport.classList.add('hidden');
            measureLabel.style.display = 'none';
            
            setTimeout(() => {
                if(arState === 'scanning') scanText.innerText = "2. Asegúrate de que la iluminación sea buena";
            }, 4000);
        }

        function handleMainAction() {
            if (!reticle.visible) return;

            const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);

            if (arState === 'ready') {
                // Primer clic: Comienza
                arState = 'drawing';
                
                // Fijar la altura de la cuadrícula al piso detectado y mostrarla
                gridHelper.position.y = pos.y;
                gridHelper.visible = true;

                topMsgText.innerText = "Apunta a la siguiente esquina.";
                btnMainAction.innerText = "Agregar nodo";
                btnExport.classList.remove('hidden');
            }

            if (arState === 'drawing') {
                // Agregar Punto
                planPoints.push({ x: pos.x, y: pos.y, z: pos.z });
                
                // Nodo visual: Esfera blanca con borde oscuro
                const sphere = new THREE.Mesh(
                    new THREE.SphereGeometry(0.02, 16, 16), 
                    new THREE.MeshBasicMaterial({ color: 0xffffff })
                );
                sphere.position.copy(pos);
                scene.add(sphere);
                meshesPoints.push(sphere);

                // Dibujar línea gruesa profesional
                if (planPoints.length > 1) {
                    const lastP = planPoints[planPoints.length - 2];
                    
                    // Línea principal blanca
                    const matSolid = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 5 });
                    const geom = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(lastP.x, pos.y, lastP.z), 
                        new THREE.Vector3(pos.x, pos.y, pos.z)
                    ]);
                    const line = new THREE.Line(geom, matSolid);
                    scene.add(line);
                    meshesLines.push(line);
                }
            }
        }

        // --- Bucle de Renderizado ---
        function animate() { renderer.setAnimationLoop(render); }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(viewerSpace => {
                        session.requestHitTestSource({ space: viewerSpace }).then(source => hitTestSource = source);
                    });
                    session.addEventListener('end', () => { 
                        hitTestSourceRequested = false; hitTestSource = null; 
                        document.getElementById('ar-ui-layer').classList.add('hidden');
                        document.getElementById('home-screen').classList.remove('hidden');
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(hitTestResults[0].getPose(referenceSpace).transform.matrix);
                        
                        // Transición de Escaneando -> Listo
                        if (arState === 'scanning') {
                            arState = 'ready';
                            scanOverlay.classList.add('hidden');
                            topMsg.classList.remove('hidden');
                            btnMainAction.classList.remove('hidden');
                            btnMainAction.innerText = "comienzo";
                        }

                        // --- Etiqueta de Distancia Flotante (Pill) ---
                        if (arState === 'drawing' && planPoints.length > 0) {
                            const lastP = planPoints[planPoints.length - 1];
                            const currentPos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
                            // Restringir distancia solo al plano XZ (suelo)
                            const distance = Math.hypot(currentPos.x - lastP.x, currentPos.z - lastP.z);
                            
                            // Posicionar etiqueta en la pantalla (A la mitad de la línea dibujada virtualmente)
                            const midPoint = new THREE.Vector3(
                                (lastP.x + currentPos.x) / 2,
                                currentPos.y,
                                (lastP.z + currentPos.z) / 2
                            );
                            midPoint.project(camera);
                            
                            // Convertir a píxeles
                            const x = (midPoint.x * .5 + .5) * window.innerWidth;
                            const y = (midPoint.y * -.5 + .5) * window.innerHeight;
                            
                            // Mostrar si está frente a la cámara
                            if(midPoint.z < 1) {
                                measureLabel.innerText = `${distance.toFixed(2)} m`;
                                measureLabel.style.display = 'block';
                                measureLabel.style.left = `${x}px`;
                                measureLabel.style.top = `${y}px`;
                            } else {
                                measureLabel.style.display = 'none';
                            }
                        } else {
                            measureLabel.style.display = 'none';
                        }
                    } else {
                        reticle.visible = false;
                        measureLabel.style.display = 'none';
                    }
                }
            }
            renderer.render(scene, camera);
        }

        // --- Exportación PDF Simple para completitud ---
        function generarPDF() {
            if(planPoints.length < 2) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(20);
            doc.text("Reporte AR Plan", 20, 20);
            doc.setFontSize(12);
            doc.text(`Puntos registrados: ${planPoints.length}`, 20, 30);
            
            let perim = 0;
            for(let i=1; i<planPoints.length; i++){
                perim += Math.hypot(planPoints[i].x - planPoints[i-1].x, planPoints[i].z - planPoints[i-1].z);
            }
            doc.text(`Perímetro mapeado: ${perim.toFixed(2)} m`, 20, 40);
            
            doc.save('Plano_AR.pdf');
        }
    </script>
</body>
</html>
