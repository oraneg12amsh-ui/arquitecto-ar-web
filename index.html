<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Arquitecto AR - Measurement PWA</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#8B5CF6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%20%22name%22%3A%20%22Arquitecto%20AR%22%2C%20%22short_name%22%3A%20%22ArquiAR%22%2C%20%22start_url%22%3A%20%22.%22%2C%20%22display%22%3A%20%22standalone%22%2C%20%22background_color%22%3A%20%22%23F4F5F9%22%2C%20%22theme_color%22%3A%20%22%238B5CF6%22%20%7D">

    <!-- Librerías Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        body { margin: 0; overflow: hidden; background-color: #F4F5F9; font-family: 'Nunito', system-ui, sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        #ar-container { width: 100vw; height: 100vh; display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #home-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; background: linear-gradient(180deg, #F8F9FA 0%, #E9ECF5 100%); overflow-y: auto; }
        #ar-ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; padding: 1rem; }
        
        .interactive { pointer-events: auto; }
        .ui-control { touch-action: none; }

        #ARButton { 
            background: #93C5FD !important; color: #1E3A8A !important; border-radius: 9999px !important; 
            padding: 16px 32px !important; font-size: 1.125rem !important; font-family: 'Nunito', sans-serif !important;
            font-weight: 700 !important; border: none !important; box-shadow: 0 10px 25px -5px rgba(147, 197, 253, 0.5) !important;
            bottom: 40px !important; position: absolute !important; left: 50% !important; transform: translateX(-50%) !important;
            width: 80% !important; max-width: 320px !important; display: flex !important; justify-content: center !important; align-items: center !important;
        }

        .measure-pill {
            position: absolute; background: white; color: #312E81; padding: 6px 16px; border-radius: 9999px;
            font-weight: 800; font-size: 1rem; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transform: translate(-50%, -50%); pointer-events: none; display: none; white-space: nowrap; z-index: 20;
            border: 2px solid #8B5CF6;
        }
        
        .measure-pill::after {
            content: ''; position: absolute; top: 50%; left: -8px; margin-top: -6px;
            border-width: 6px 8px 6px 0; border-style: solid; border-color: transparent #8B5CF6 transparent transparent;
        }

        /* Toolbar Activo */
        .tool-btn.active { background-color: #8B5CF6; color: white; transform: scale(1.05); }
        .tool-btn { transition: all 0.2s ease; }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn-ar-action {
            background: rgba(139, 92, 246, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 8px 32px rgba(109, 40, 217, 0.3);
        }
    </style>
</head>
<body>

    <!-- 1. PANTALLA DE INICIO (HOME) -->
    <div id="home-screen" class="flex flex-col items-center pt-16 px-6 relative overflow-x-hidden pb-24">
        <div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
        
        <div class="w-full max-w-sm mb-6 flex justify-between items-center z-10">
            <div>
                <h1 class="text-3xl font-extrabold text-[#1E3A8A]">ArquiAR<span class="text-[#8B5CF6]">.</span></h1>
                <p class="text-sm font-semibold text-slate-500">Measurement PWA</p>
            </div>
            <div class="bg-white p-2 rounded-xl shadow-sm border border-slate-100 flex gap-2 text-xl text-[#312E81]">
                <i class="fa-solid fa-cloud text-emerald-500" title="Auto-Guardado Activo"></i>
            </div>
        </div>

        <div class="flex flex-col gap-5 w-full max-w-sm z-10">
            <!-- Modo Medición Avanzada -->
            <button id="btn-mode-advanced" class="bg-white rounded-[2rem] p-6 shadow-lg border border-slate-50 flex items-center gap-5 active:scale-95 transition-transform text-left relative overflow-hidden">
                <div class="w-20 h-20 flex-shrink-0 bg-[#F5F3FF] rounded-2xl p-4 flex items-center justify-center text-[#8B5CF6]">
                    <i class="fa-solid fa-cube text-4xl"></i>
                </div>
                <div>
                    <h2 class="text-[#312E81] text-xl font-bold leading-tight">Medición<br>Avanzada</h2>
                    <p class="text-slate-400 text-xs mt-1 font-semibold">Distancias, Áreas, Volúmenes y Ángulos</p>
                </div>
            </button>

            <!-- Modo Planta (Perímetro) -->
            <button id="btn-mode-room" class="bg-white rounded-[2rem] p-6 shadow-md border border-slate-50 flex items-center gap-5 active:scale-95 transition-transform text-left relative overflow-hidden">
                <div class="w-20 h-20 flex-shrink-0 bg-[#EFF6FF] rounded-2xl p-4 flex items-center justify-center text-[#1E3A8A]">
                    <i class="fa-solid fa-vector-square text-4xl"></i>
                </div>
                <div>
                    <h2 class="text-[#312E81] text-xl font-bold leading-tight">Planta<br>Sencilla</h2>
                    <p class="text-slate-400 text-xs mt-1 font-semibold">Generador de perímetros 2D</p>
                </div>
            </button>
        </div>
        
        <div id="ar-button-container" class="w-full flex justify-center mt-10 z-10"></div>
    </div>

    <!-- Contenedor AR 3D -->
    <div id="ar-container"></div>

    <!-- 3. CAPA UI EN AR (DOM Overlay) -->
    <div id="ar-ui-layer" class="hidden">
        
        <div id="measure-label" class="measure-pill">0.00 m</div>

        <!-- Toolbar Superior -->
        <div class="flex justify-between items-start w-full">
            <button id="btn-exit" class="interactive ui-control bg-white/90 backdrop-blur-md text-[#312E81] w-12 h-12 rounded-full shadow-lg flex items-center justify-center active:scale-90 transition-transform">
                <i class="fa-solid fa-arrow-left-long text-xl"></i>
            </button>
            
            <div class="flex gap-3">
                <!-- Botón de Unidades -->
                <button id="btn-units" class="interactive ui-control bg-white/90 backdrop-blur-md text-[#8B5CF6] font-bold px-4 h-12 rounded-full shadow-lg flex items-center justify-center active:scale-90 transition-transform">
                    <span id="unit-text">MÉTRICO</span>
                </button>
                <button id="btn-export" class="interactive ui-control bg-emerald-500 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center active:scale-90 transition-transform">
                    <i class="fa-solid fa-download text-xl"></i>
                </button>
            </div>
        </div>

        <!-- Toolbar Lateral Izquierdo (Herramientas PWA) -->
        <div id="tools-sidebar" class="absolute left-4 top-1/2 transform -translate-y-1/2 flex flex-col gap-3 interactive slide-up">
            <button class="tool-btn ui-control w-12 h-12 rounded-2xl bg-white shadow-lg flex flex-col items-center justify-center text-slate-500 active" data-tool="line">
                <i class="fa-solid fa-ruler"></i><span class="text-[8px] font-bold mt-1">Línea</span>
            </button>
            <button class="tool-btn ui-control w-12 h-12 rounded-2xl bg-white shadow-lg flex flex-col items-center justify-center text-slate-500" data-tool="area">
                <i class="fa-regular fa-square"></i><span class="text-[8px] font-bold mt-1">Área</span>
            </button>
            <button class="tool-btn ui-control w-12 h-12 rounded-2xl bg-white shadow-lg flex flex-col items-center justify-center text-slate-500" data-tool="volume">
                <i class="fa-solid fa-cube"></i><span class="text-[8px] font-bold mt-1">Volumen</span>
            </button>
            <button class="tool-btn ui-control w-12 h-12 rounded-2xl bg-white shadow-lg flex flex-col items-center justify-center text-slate-500" data-tool="angle">
                <i class="fa-solid fa-angle-left"></i><span class="text-[8px] font-bold mt-1">Ángulo</span>
            </button>
            <div class="w-8 border-b-2 border-slate-200 mx-auto my-1"></div>
            <button id="btn-undo" class="ui-control w-12 h-12 rounded-2xl bg-white shadow-lg flex flex-col items-center justify-center text-rose-500 active:bg-rose-50">
                <i class="fa-solid fa-rotate-left"></i><span class="text-[8px] font-bold mt-1">Deshacer</span>
            </button>
        </div>

        <!-- Overlay de Instrucciones -->
        <div id="ar-top-msg" class="absolute top-20 left-1/2 transform -translate-x-1/2 bg-white/95 backdrop-blur-md px-6 py-3 rounded-full shadow-lg text-center hidden slide-up interactive border-l-4 border-[#8B5CF6]">
            <p id="ar-top-msg-text" class="text-[#312E81] font-bold text-sm">Escaneando entorno...</p>
        </div>

        <!-- Botón de Acción Principal -->
        <div class="absolute bottom-8 left-0 w-full flex justify-center interactive">
            <button id="btn-main-action" class="ui-control btn-ar-action text-white rounded-[2rem] px-12 py-4 font-bold text-lg active:scale-95 transition-all duration-200 hidden tracking-wide shadow-2xl flex items-center gap-3">
                <i class="fa-solid fa-crosshairs"></i> <span id="btn-action-text">Fijar Punto</span>
            </button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js';

        // --- Fake Service Worker Registration (PWA Requirement) ---
        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('install', e => e.waitUntil(Promise.resolve())); self.addEventListener('fetch', e => {});`;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(console.error);
        }

        // --- Estado Global ---
        let appMode = 'advanced'; // 'advanced', 'room'
        let currentTool = 'line'; // 'line', 'area', 'volume', 'angle'
        let unitSystem = 'metric'; // 'metric' (m), 'imperial' (ft)
        
        let arState = 'scanning'; // 'scanning', 'ready', 'drawing'
        let currentMeasurePoints = []; // Puntos de la medición actual
        let savedMeasurements = []; // Todas las mediciones guardadas
        
        let camera, scene, renderer, controller, reticle;
        let hitTestSource = null, hitTestSourceRequested = false;
        
        // Elementos 3D Temporales y Guardados
        let tempMeshes = []; 
        let permanentMeshes = [];
        let gridHelper = null;

        // UI Elements
        const measureLabel = document.getElementById('measure-label');
        const topMsg = document.getElementById('ar-top-msg');
        const topMsgText = document.getElementById('ar-top-msg-text');
        const btnMainAction = document.getElementById('btn-main-action');
        const btnActionText = document.getElementById('btn-action-text');
        const toolsSidebar = document.getElementById('tools-sidebar');

        // --- Funciones de Utilidad ---
        function formatUnit(meters) {
            if (unitSystem === 'metric') return `${meters.toFixed(2)} m`;
            const feet = meters * 3.28084;
            return `${feet.toFixed(2)} ft`;
        }

        function formatArea(sqMeters) {
            if (unitSystem === 'metric') return `${sqMeters.toFixed(2)} m²`;
            return `${(sqMeters * 10.7639).toFixed(2)} ft²`;
        }

        function formatVolume(cbMeters) {
            if (unitSystem === 'metric') return `${cbMeters.toFixed(2)} m³`;
            return `${(cbMeters * 35.3147).toFixed(2)} ft³`;
        }

        function triggerHaptic() {
            if (navigator.vibrate) navigator.vibrate(50);
        }

        // --- Event Listeners Iniciales ---
        document.getElementById('btn-mode-advanced').addEventListener('click', () => { appMode = 'advanced'; toolsSidebar.style.display = 'flex'; });
        document.getElementById('btn-mode-room').addEventListener('click', () => { appMode = 'room'; toolsSidebar.style.display = 'none'; currentTool = 'line'; });

        document.getElementById('btn-units').addEventListener('click', (e) => {
            unitSystem = unitSystem === 'metric' ? 'imperial' : 'metric';
            document.getElementById('unit-text').innerText = unitSystem === 'metric' ? 'MÉTRICO' : 'IMPERIAL';
        });

        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                const target = e.currentTarget;
                target.classList.add('active');
                currentTool = target.dataset.tool;
                resetCurrentMeasurement();
                updateInstructions();
            });
        });

        document.getElementById('btn-undo').addEventListener('click', undoMeasurement);
        document.getElementById('btn-exit').addEventListener('click', () => renderer.xr.getSession()?.end());
        document.getElementById('btn-export').addEventListener('click', generarPDF);

        // --- Inicialización 3D ---
        init();
        animate();

        function init() {
            const container = document.getElementById('ar-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            scene.add(new THREE.HemisphereLight(0xffffff, 0x666666, 0.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(1, 5, 1);
            scene.add(dirLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);
            
            const arButtonEl = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ar-ui-layer') }
            });
            arButtonEl.innerHTML = '<i class="fa-solid fa-vr-cardboard mr-2"></i> Iniciar Entorno AR';
            arButtonEl.addEventListener('click', () => {
                document.getElementById('home-screen').classList.add('hidden');
                document.getElementById('ar-ui-layer').classList.remove('hidden');
                resetARState();
                loadFromStorage();
            });
            document.getElementById('ar-button-container').appendChild(arButtonEl);

            controller = renderer.xr.getController(0);
            scene.add(controller);

            // Retícula PWA Pro
            const reticleGroup = new THREE.Group();
            reticleGroup.add(new THREE.Mesh(new THREE.RingGeometry(0.06, 0.07, 32).rotateX(-Math.PI / 2), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9, depthTest: false })));
            reticleGroup.add(new THREE.Mesh(new THREE.CircleGeometry(0.01, 16).rotateX(-Math.PI / 2), new THREE.MeshBasicMaterial({ color: 0x8B5CF6, depthTest: false })));
            
            // Puntero vertical (Guía para techos/paredes)
            reticleGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,1,0)]), new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 })));

            reticle = reticleGroup;
            reticle.matrixAutoUpdate = false; 
            reticle.visible = false;
            reticle.renderOrder = 999; 
            scene.add(reticle);

            gridHelper = new THREE.GridHelper(20, 100, 0x8B5CF6, 0xffffff);
            gridHelper.material.opacity = 0.15;
            gridHelper.material.transparent = true;
            gridHelper.visible = false;
            scene.add(gridHelper);

            btnMainAction.addEventListener('beforexrselect', (ev) => ev.preventDefault());
            btnMainAction.addEventListener('click', handleMainAction);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Lógica Principal de AR ---
        function resetARState() {
            arState = 'scanning';
            resetCurrentMeasurement();
            gridHelper.visible = false;
            topMsg.classList.remove('hidden');
            topMsgText.innerText = "Mueve el dispositivo para mapear el entorno...";
            btnMainAction.classList.add('hidden');
            measureLabel.style.display = 'none';
        }

        function resetCurrentMeasurement() {
            currentMeasurePoints = [];
            tempMeshes.forEach(m => scene.remove(m));
            tempMeshes = [];
            updateInstructions();
        }

        function updateInstructions() {
            let pts = currentMeasurePoints.length;
            if (currentTool === 'line') topMsgText.innerText = pts === 0 ? "Fija el primer punto" : "Fija el punto final";
            if (currentTool === 'area') topMsgText.innerText = pts === 0 ? "Marca la primera esquina" : "Marca la esquina diagonal opuesta";
            if (currentTool === 'volume') {
                if(pts===0) topMsgText.innerText = "1/3: Esquina base inicial";
                if(pts===1) topMsgText.innerText = "2/3: Esquina base diagonal";
                if(pts===2) topMsgText.innerText = "3/3: Define la altura (levanta la cámara)";
            }
            if (currentTool === 'angle') {
                if(pts===0) topMsgText.innerText = "1/3: Primer vector";
                if(pts===1) topMsgText.innerText = "2/3: Vértice central (esquina)";
                if(pts===2) topMsgText.innerText = "3/3: Segundo vector";
            }
        }

        function handleMainAction() {
            if (!reticle.visible) return;
            triggerHaptic();

            const pos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);
            currentMeasurePoints.push(pos.clone());

            // Dibujar punto temporal
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.02, 16, 16), new THREE.MeshBasicMaterial({ color: 0x8B5CF6 }));
            sphere.position.copy(pos);
            scene.add(sphere);
            tempMeshes.push(sphere);

            // Validar si la herramienta terminó su ciclo
            let toolFinished = false;
            if (currentTool === 'line' && currentMeasurePoints.length === 2) toolFinished = true;
            if (currentTool === 'area' && currentMeasurePoints.length === 2) toolFinished = true;
            if (currentTool === 'volume' && currentMeasurePoints.length === 3) toolFinished = true;
            if (currentTool === 'angle' && currentMeasurePoints.length === 3) toolFinished = true;

            if (toolFinished) {
                finalizeMeasurement();
            } else {
                updateInstructions();
            }
        }

        // --- Finalizar Medición y Dibujar ---
        function finalizeMeasurement() {
            let finalMesh = null;
            let resultText = "";

            if (currentTool === 'line') {
                const [p1, p2] = currentMeasurePoints;
                const dist = p1.distanceTo(p2);
                resultText = formatUnit(dist);
                
                const geom = new THREE.BufferGeometry().setFromPoints([p1, p2]);
                finalMesh = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 3 }));
            }
            else if (currentTool === 'area') {
                const [p1, p2] = currentMeasurePoints;
                // Asumimos un rectángulo en el plano XZ (suelo) o XY (pared)
                // Para simplificar, proyectamos en XZ si la diferencia en Y es pequeña
                const p3 = new THREE.Vector3(p1.x, p1.y, p2.z);
                const p4 = new THREE.Vector3(p2.x, p1.y, p1.z);
                
                const width = p1.distanceTo(p4);
                const depth = p1.distanceTo(p3);
                resultText = formatArea(width * depth);

                const shape = new THREE.Shape();
                shape.moveTo(0, 0); shape.lineTo(width, 0); shape.lineTo(width, depth); shape.lineTo(0, depth); shape.lineTo(0, 0);
                const geom = new THREE.ShapeGeometry(shape);
                geom.rotateX(Math.PI/2);
                
                finalMesh = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ color: 0x34D399, opacity: 0.4, transparent: true, side: THREE.DoubleSide }));
                finalMesh.position.copy(new THREE.Vector3(Math.min(p1.x, p2.x), p1.y, Math.min(p1.z, p2.z)));
            }
            else if (currentTool === 'volume') {
                const [p1, p2, p3] = currentMeasurePoints;
                const width = Math.abs(p1.x - p2.x);
                const depth = Math.abs(p1.z - p2.z);
                const height = Math.abs(p3.y - p1.y);
                resultText = formatVolume(width * depth * height);

                const geom = new THREE.BoxGeometry(width, height, depth);
                finalMesh = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ color: 0x60A5FA, opacity: 0.3, transparent: true }));
                finalMesh.position.set((p1.x+p2.x)/2, p1.y + (p3.y-p1.y)/2, (p1.z+p2.z)/2);
                
                // Bordes del cubo
                const edges = new THREE.EdgesGeometry(geom);
                const lines = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff }));
                finalMesh.add(lines);
            }
            else if (currentTool === 'angle') {
                const [p1, pCenter, p2] = currentMeasurePoints;
                const v1 = new THREE.Vector3().subVectors(p1, pCenter).normalize();
                const v2 = new THREE.Vector3().subVectors(p2, pCenter).normalize();
                const angleRad = v1.angleTo(v2);
                resultText = `${THREE.MathUtils.radToDeg(angleRad).toFixed(1)}°`;

                const geom = new THREE.BufferGeometry().setFromPoints([p1, pCenter, p2]);
                finalMesh = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0xFBBF24, linewidth: 3 }));
            }

            if (finalMesh) {
                scene.add(finalMesh);
                // Guardar la medición
                const record = { tool: currentTool, points: currentMeasurePoints.map(p=>({x:p.x, y:p.y, z:p.z})), result: resultText };
                savedMeasurements.push({ mesh: finalMesh, data: record });
                saveToStorage();
                
                // Mostrar un pequeño cartel 3D/CSS temporal (Opcional, lo dejamos en UI principal)
                topMsgText.innerText = `Registrado: ${resultText}`;
                setTimeout(updateInstructions, 2000);
            }

            // Limpiar temporales
            tempMeshes.forEach(m => scene.remove(m));
            tempMeshes = [];
            currentMeasurePoints = [];
        }

        // --- Render Loop (Vista Previa en Vivo) ---
        function animate() { renderer.setAnimationLoop(render); }

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then(viewerSpace => {
                        session.requestHitTestSource({ space: viewerSpace }).then(source => hitTestSource = source);
                    });
                    session.addEventListener('end', () => { 
                        hitTestSourceRequested = false; hitTestSource = null; 
                        document.getElementById('ar-ui-layer').classList.add('hidden');
                        document.getElementById('home-screen').classList.remove('hidden');
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(hitTestResults[0].getPose(referenceSpace).transform.matrix);
                        const currentPos = new THREE.Vector3().setFromMatrixPosition(reticle.matrix);

                        if (arState === 'scanning') {
                            arState = 'ready';
                            gridHelper.position.y = currentPos.y;
                            gridHelper.visible = true;
                            btnMainAction.classList.remove('hidden');
                            updateInstructions();
                        }

                        // --- Previsualización Dinámica (Goma elástica) ---
                        if (currentMeasurePoints.length > 0) {
                            let liveText = "";
                            const p1 = currentMeasurePoints[0];

                            if (currentTool === 'line') {
                                liveText = formatUnit(p1.distanceTo(currentPos));
                            } else if (currentTool === 'area' && currentMeasurePoints.length === 1) {
                                const w = Math.abs(currentPos.x - p1.x);
                                const d = Math.abs(currentPos.z - p1.z);
                                liveText = formatArea(w * d);
                            } else if (currentTool === 'volume') {
                                if (currentMeasurePoints.length === 2) {
                                    const p2 = currentMeasurePoints[1];
                                    const w = Math.abs(p2.x - p1.x);
                                    const d = Math.abs(p2.z - p1.z);
                                    const h = Math.abs(currentPos.y - p1.y);
                                    liveText = formatVolume(w * d * h);
                                }
                            } else if (currentTool === 'angle' && currentMeasurePoints.length === 2) {
                                const pCenter = currentMeasurePoints[1];
                                const v1 = new THREE.Vector3().subVectors(p1, pCenter).normalize();
                                const v2 = new THREE.Vector3().subVectors(currentPos, pCenter).normalize();
                                liveText = `${THREE.MathUtils.radToDeg(v1.angleTo(v2)).toFixed(1)}°`;
                            }

                            // Posicionar etiqueta flotante
                            const screenPos = currentPos.clone().project(camera);
                            const x = (screenPos.x * .5 + .5) * window.innerWidth;
                            const y = (screenPos.y * -.5 + .5) * window.innerHeight;
                            
                            if (screenPos.z < 1) {
                                measureLabel.innerText = liveText;
                                measureLabel.style.display = 'block';
                                measureLabel.style.left = `${x}px`;
                                measureLabel.style.top = `${y - 40}px`;
                            } else {
                                measureLabel.style.display = 'none';
                            }
                        } else {
                            measureLabel.style.display = 'none';
                        }
                    } else {
                        reticle.visible = false;
                        measureLabel.style.display = 'none';
                    }
                }
            }
            renderer.render(scene, camera);
        }

        // --- Gestión de Archivos / Persistencia ---
        function undoMeasurement() {
            if (currentMeasurePoints.length > 0) {
                // Cancelar medición en curso
                resetCurrentMeasurement();
            } else if (savedMeasurements.length > 0) {
                // Borrar última medición guardada
                const last = savedMeasurements.pop();
                scene.remove(last.mesh);
                saveToStorage();
                topMsgText.innerText = "Última medición eliminada.";
            }
        }

        function saveToStorage() {
            const data = savedMeasurements.map(s => s.data);
            localStorage.setItem('arqui_ar_project', JSON.stringify(data));
        }

        function loadFromStorage() {
            // (Simplificado) Idealmente reconstruiría las mallas 3D desde JSON
            const data = localStorage.getItem('arqui_ar_project');
            if (data) {
                // topMsgText.innerText = "Proyecto anterior encontrado. (En esta versión se limpia el visualizador)";
            }
        }

        // --- Exportación a PDF ---
        function generarPDF() {
            if(savedMeasurements.length === 0) { alert("No hay mediciones para exportar."); return; }
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(139, 92, 246);
            doc.rect(0,0,210,30,'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(20);
            doc.text("Reporte PWA - ArquiAR", 20, 20);
            
            doc.setTextColor(50, 50, 50);
            doc.setFontSize(12);
            doc.text(`Fecha: ${new Date().toLocaleString('es-ES')}`, 20, 40);
            
            let y = 50;
            doc.setFontSize(10);
            savedMeasurements.forEach((item, index) => {
                const tipoMap = { 'line': 'Distancia Lineal', 'area': 'Área Superficial', 'volume': 'Volumen Detectado', 'angle': 'Ángulo Medido' };
                doc.text(`${index + 1}. [${tipoMap[item.data.tool]}]  ->  Resultado: ${item.data.result}`, 20, y);
                y += 10;
            });
            
            doc.save('Reporte_Mediciones_AR.pdf');
        }
    </script>
</body>
